openapi: 3.0.3
info:
  title: Quantumy Auth API
  description: ユーザー登録・ログイン（Doctor Canvas バックエンド）
  version: 0.1.0
servers:
  - url: http://localhost:3000
    description: ローカル

paths:
  /health:
    get:
      summary: 生存確認（DB 非依存）
      responses:
        '200':
          description: プロセス正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: quantumy-api

  /api/register:
    post:
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 入力不正
        '409':
          description: メール重複

  /api/login:
    post:
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 成功（パスワード一致）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: メール不明またはパスワード不一致

  /api/works/{work_key}/progress:
    parameters:
      - name: work_key
        in: path
        required: true
        schema:
          type: string
    get:
      summary: 作品進捗（最後のスプレッド）取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkProgressResponse'
        '401':
          description: 認証エラー
    post:
      summary: 作品進捗（最後のスプレッド）保存
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkProgressUpdateRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkProgressResponse'
        '400':
          description: リクエスト不正

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true
        access_token:
          type: string
          nullable: true
        expires_in_secs:
          type: integer
          format: int64
          description: ログイン成功時のみ。アクセストークンの有効秒数。

    WorkProgressUpdateRequest:
      type: object
      required: [last_spread_index]
      properties:
        last_spread_index:
          type: integer
          minimum: 0

    WorkProgressResponse:
      type: object
      properties:
        ok:
          type: boolean
        work_key:
          type: string
        last_spread_index:
          type: integer

