<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr.CANVAS - Quantumy</title>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: #0f1419;
      }
      * {
        box-sizing: border-box;
      }
      .readerTouchSurface {
        touch-action: none;
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <!-- PDF.js: ブラウザ内 PDF テキスト抽出（サーバー不要・コールドスタート回避） -->
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const doctorProfile = {
        id: "doctor",
        name: "博士漫画家",
        degree: "Ph.D. in Physics",
        field: "量子情報・量子もつれ",
        avatarUrl: "https://dummyimage.com/160x160/253358/ffe03a&text=DR",
      };

      const references = [
        {
          title: "Quantum Entanglement and Information",
          author: "A. Einstein, B. Podolsky, N. Rosen",
          doi: "10.1103/PhysRev.47.777",
          summary:
            "量子力学における相関した二粒子系について、局所実在論との矛盾を指摘した古典的論文。のちのEPRパラドックスとして知られ、量子情報の基礎づけに影響を与えた。",
        },
        {
          title: "A New Kind of Science",
          author: "Stephen Wolfram",
          doi: "10.5555/nks.123456",
          summary:
            "単純なルールから複雑な振る舞いが生まれるセルオートマトン等を扱う。計算論的な視点から自然界の複雑系を探求し、科学の新しい枠組みを提唱している。",
        },
      ];

      const mangaPages = [
        { imageUrl: "https://dummyimage.com/600x900/ebf5fb/333&text=1", pageNumber: 1 },
        { imageUrl: "https://dummyimage.com/600x900/d6eaf8/333&text=2", pageNumber: 2 },
        { imageUrl: "https://dummyimage.com/600x900/aed6f1/333&text=3", pageNumber: 3 },
        { imageUrl: "https://dummyimage.com/600x900/afeeee/333&text=4", pageNumber: 4 },
        { imageUrl: "https://dummyimage.com/600x900/ffd7c2/333&text=5", pageNumber: 5 },
      ];

      // ---------------------------
      // Works（暫定20作）
      // ---------------------------
      const workCategoryPool = [
        "ファンタジー",
        "学園・スポーツ",
        "ラブコメ",
        "コメディ・ギャグ",
        "ミステリー・ホラー",
        "その他",
      ];
      const academicMajorPool = ["物理学", "化学", "生物学", "数学", "情報科学", "医学"];
      const academicMinorPoolByMajor = {
        物理学: ["量子力学", "熱力学", "統計物理", "相対論", "固体物理", "光学"],
        化学: ["有機化学", "無機化学", "物理化学", "分析化学", "材料化学"],
        生物学: ["分子生物学", "神経科学", "免疫学", "生態学", "進化"],
        数学: ["確率・統計", "線形代数", "解析", "離散数学", "幾何"],
        情報科学: ["機械学習", "計算理論", "暗号", "分散システム", "HCI"],
        医学: ["内科", "外科", "精神科", "公衆衛生", "薬理"],
      };
      const workFieldPool = [
        "量子情報・量子もつれ",
        "量子計算・アルゴリズム",
        "量子暗号",
        "統計物理・相転移",
        "計算理論・複雑系",
        "量子測定と情報",
      ];
      const workSynopsisPool = [
        "導入で“相関の正体”を描き、対比で“古典の限界”をあぶり出し、解法で“量子の道”へ。最後は余韻として観測の意味が胸に残る。",
        "一見バラバラの記号が、読み進めるほど物語として繋がっていく。博士が論文を“漫画の順序”へ翻訳する。",
        "理論の芯を、コマの密度で体感する。読み終えたあと、手元のノートが自然にページをめくりたくなる。",
        "相手を想うほど“測る”が難しくなる。測定・情報・解釈の三角形が、勢いよく崩れていく。",
        "数式の代わりに“絵の論理”で説く。あなたの理解が、物語のテンポに同期する。",
        "問題提起から導入、対比、そして解法へ。最後に“余韻”として残るのは問いそのもの。",
      ];

      const works = Array.from({ length: 20 }, (_, i) => {
        const idx = i + 1;
        const field = workFieldPool[i % workFieldPool.length];
        const ref = references[i % references.length];
        const category = workCategoryPool[i % workCategoryPool.length];
        const major = academicMajorPool[i % academicMajorPool.length];
        const minors = academicMinorPoolByMajor[major] || ["一般"];
        const minor = minors[i % minors.length];
        return {
          id: `work${idx}`,
          slug: `quantumy-doctor-canvas-${idx}`,
          title: `Quantumy Doctor Canvas #${idx}`,
          researchField: field,
          category,
          academicMajor: major,
          academicMinor: minor,
          doi: ref.doi,
          description: workSynopsisPool[i % workSynopsisPool.length],
          coverImageUrl: `https://dummyimage.com/600x800/052a12/ffffff&text=WORK%20${idx}`,
          authorId: doctorProfile.id,
        };
      });

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function clamp(n, min, max) {
        return Math.min(max, Math.max(min, n));
      }

      // Spread: 左1ページ(1P) + 2P以降は「2ページずつ」
      function getSpreadForIndex(pageCount, spreadIndex) {
        if (pageCount <= 0) return { left: null, right: null };
        if (spreadIndex === 0) return { left: 0, right: null };
        const left = 2 * spreadIndex - 1;
        const right = left + 1 < pageCount ? left + 1 : null;
        return { left, right };
      }

      function getMaxSpreadIndex(pageCount) {
        const pairCount = Math.ceil(Math.max(pageCount - 1, 0) / 2);
        return 1 + pairCount - 1;
      }

      // Continue-from（未ログインは guest localStorage、ログイン後は user API）
      const PROGRESS_PREFIX = "drcanvas:lastSpread:";

      function getProgressStorageKey(workId) {
        return `${PROGRESS_PREFIX}${workId}`;
      }

      function loadLastSpreadIndexGuest(workId) {
        try {
          const raw = localStorage.getItem(getProgressStorageKey(workId));
          if (!raw) return 0;
          const n = Number(raw);
          return Number.isFinite(n) ? n : 0;
        } catch {
          return 0;
        }
      }

      function saveLastSpreadIndexGuest(workId, spreadIndex) {
        try {
          localStorage.setItem(getProgressStorageKey(workId), String(spreadIndex));
        } catch {
          // ignore
        }
      }

      function getAccessToken() {
        try {
          return localStorage.getItem("drcanvas:accessToken") || localStorage.getItem("access_token") || "";
        } catch {
          return "";
        }
      }

      function getApiBaseUrl() {
        // 明示設定があれば最優先
        try {
          const saved = localStorage.getItem("drcanvas:apiBaseUrl");
          if (saved) return saved;
        } catch {
          // ignore
        }

        // ローカル開発向けの簡易推定（フロントが 3000 以外なら 3000 を見る）
        const host = window.location.hostname;
        const port = window.location.port;
        const isLocal = host === "localhost" || host === "127.0.0.1" || host === "::1";
        if (!isLocal) return "";
        if (!port) return `http://${host}:3000`;
        if (port === "3000") return "";
        return `http://${host}:3000`;
      }

      function setApiBaseUrl(baseUrl) {
        try {
          localStorage.setItem("drcanvas:apiBaseUrl", baseUrl);
        } catch {
          // ignore
        }
      }

      /** GET /health で API 生存確認（入力欄の URL 優先、空なら getApiBaseUrl） */
      async function fetchApiHealth(baseOverride) {
        const trimmed = String(baseOverride ?? "").trim();
        const base = trimmed || getApiBaseUrl() || "";
        if (!base) {
          return { ok: false, message: "URL を入力するか、ローカルで API を起動してください。" };
        }
        const url = `${String(base).replace(/\/$/, "")}/health`;
        let res;
        try {
          res = await fetch(url, { method: "GET" });
        } catch (e) {
          const isNet =
            e?.name === "TypeError" ||
            /fetch|Failed to fetch|NetworkError/i.test(String(e?.message || ""));
          return {
            ok: false,
            message: isNet ? "ネットワークエラー（CORS または到達不可）。" : String(e?.message || "エラー"),
          };
        }
        const text = await res.text();
        let body = null;
        try {
          body = text ? JSON.parse(text) : null;
        } catch {
          body = null;
        }
        if (!res.ok) return { ok: false, message: `HTTP ${res.status}` };
        if (body && body.status === "ok") return { ok: true, message: "API は応答しています（/health）。" };
        return { ok: false, message: "応答形式が想定外です。" };
      }

      /** 進捗API失敗時に一度だけユーザーへ見せるメモ（sessionStorage） */
      function setProgressSyncNote(text) {
        try {
          if (text) sessionStorage.setItem("drcanvas:progressSyncNote", text);
          else sessionStorage.removeItem("drcanvas:progressSyncNote");
        } catch {
          // ignore
        }
      }

      function readProgressSyncNote() {
        try {
          return sessionStorage.getItem("drcanvas:progressSyncNote") || "";
        } catch {
          return "";
        }
      }

      function clearProgressSyncNote() {
        setProgressSyncNote("");
      }

      function apiUrl(path) {
        const base = getApiBaseUrl();
        return base ? `${base}${path}` : path;
      }

      async function loadLastSpreadIndex(workId) {
        const token = getAccessToken();
        if (!token) return loadLastSpreadIndexGuest(workId);

        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workId)}/progress`), {
            method: "GET",
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            setProgressSyncNote(
              `進捗をAPIから読み取れませんでした（HTTP ${res.status}）。端末に保存した値を表示します。#auth のAPI接続先を確認してください。`
            );
            return loadLastSpreadIndexGuest(workId);
          }
          const json = await res.json();
          const n = Number(json.last_spread_index ?? json.lastSpreadIndex ?? 0);
          return Number.isFinite(n) ? n : 0;
        } catch {
          setProgressSyncNote(
            "ネットワークのため進捗APIに接続できませんでした。端末に保存した値を表示します。"
          );
          return loadLastSpreadIndexGuest(workId);
        }
      }

      async function saveLastSpreadIndex(workId, spreadIndex) {
        const token = getAccessToken();
        if (!token) return saveLastSpreadIndexGuest(workId, spreadIndex);

        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workId)}/progress`), {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ last_spread_index: spreadIndex }),
          });
          if (!res.ok) {
            setProgressSyncNote(
              `ログイン中の進捗をAPIに保存できませんでした（HTTP ${res.status}）。この端末にバックアップ保存しました。#auth でAPI接続先を確認してください。`
            );
            saveLastSpreadIndexGuest(workId, spreadIndex);
            return;
          }
        } catch {
          setProgressSyncNote(
            "ネットワークのため進捗をAPIに保存できませんでした。この端末にのみ保存しました。#auth でAPI接続先を確認してください。"
          );
          saveLastSpreadIndexGuest(workId, spreadIndex);
        }
      }

      // ── コミュニティ API ──────────────────────────────────────────────

      async function fetchComments(workKey) {
        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workKey)}/comments`));
          if (!res.ok) return [];
          const json = await res.json();
          return json.comments || [];
        } catch {
          return [];
        }
      }

      async function postComment(workKey, body) {
        const token = getAccessToken();
        if (!token) return { ok: false, error: "ログインが必要です。" };
        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workKey)}/comments`), {
            method: "POST",
            headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ body }),
          });
          const json = await res.json();
          if (!res.ok) return { ok: false, error: json.error || "投稿に失敗しました。" };
          return { ok: true };
        } catch {
          return { ok: false, error: "ネットワークエラー" };
        }
      }

      async function fetchFavoriteStatus(workKey) {
        const token = getAccessToken();
        if (!token) return false;
        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workKey)}/favorite`), {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) return false;
          const json = await res.json();
          return !!json.favorited;
        } catch {
          return false;
        }
      }

      async function toggleFavoriteApi(workKey) {
        const token = getAccessToken();
        if (!token) return null;
        try {
          const res = await fetch(apiUrl(`/api/works/${encodeURIComponent(workKey)}/favorite`), {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) return null;
          const json = await res.json();
          return json.favorited;
        } catch {
          return null;
        }
      }

      async function fetchDashboard() {
        const token = getAccessToken();
        if (!token) return null;
        try {
          const res = await fetch(apiUrl("/api/users/me/dashboard"), {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) return null;
          return await res.json();
        } catch {
          return null;
        }
      }

      /** API の artworks を WorksView / MangaReader と同じ形へ */
      function normalizeCatalogArtwork(item) {
        if (!item || !item.id) return null;
        const meta = (item.content_json && item.content_json.meta) || {};
        const pages = (item.content_json && item.content_json.pages) || [];
        return {
          id: item.id,
          slug: item.id,
          title: item.title || "",
          researchField: meta.researchField || item.research_field || "",
          category: meta.category || item.category || "",
          academicMajor: meta.academicMajor || item.academic_major || "",
          academicMinor: meta.academicMinor || item.academic_minor || "",
          doi: item.doi || "",
          description: item.description || "",
          coverImageUrl: meta.coverImageUrl || item.cover_image_url || item.thumbnail_url || "",
          authorId: doctorProfile.id,
          pages,
          price: item.price != null ? item.price : 0,
        };
      }

      async function fetchCatalogArtworksArray() {
        try {
          const res = await fetch(apiUrl("/api/catalog/works"));
          if (!res.ok) return [];
          const json = await res.json();
          const items = json.items || [];
          return items.map(normalizeCatalogArtwork).filter(Boolean);
        } catch {
          return [];
        }
      }

      async function fetchCatalogArtworkDetail(id) {
        try {
          const res = await fetch(apiUrl(`/api/catalog/works/${encodeURIComponent(id)}`));
          if (!res.ok) return null;
          const json = await res.json();
          return json.artwork ? normalizeCatalogArtwork(json.artwork) : null;
        } catch {
          return null;
        }
      }

      /** 著者: 下書き作成・公開（ログイン必須） */
      function StudioView({ onBack, onPublished }) {
        const token = getAccessToken();
        const [items, setItems] = useState([]);
        const [busy, setBusy] = useState(false);
        const [msg, setMsg] = useState("");
        const defaultPagesJson = JSON.stringify(
          [
            { imageUrl: "https://dummyimage.com/600x900/ebf5fb/333&text=1", pageNumber: 1 },
            { imageUrl: "https://dummyimage.com/600x900/d6eaf8/333&text=2", pageNumber: 2 },
          ],
          null,
          2
        );
        const [title, setTitle] = useState("");
        const [description, setDescription] = useState("");
        const [researchField, setResearchField] = useState("");
        const [category, setCategory] = useState("");
        const [pagesJson, setPagesJson] = useState(defaultPagesJson);

        const loadMine = () => {
          if (!token) return;
          fetch(apiUrl("/api/artworks/mine"), { headers: { Authorization: `Bearer ${token}` } })
            .then((r) => r.json())
            .then((j) => setItems(j.items || []))
            .catch(() => setMsg("一覧を読み込めませんでした。"));
        };

        useEffect(() => {
          loadMine();
        }, []);

        const submitCreate = async () => {
          if (!token) {
            setMsg("ログインしてください。");
            return;
          }
          const t = title.trim();
          if (!t) {
            setMsg("タイトルを入力してください。");
            return;
          }
          let pages;
          try {
            pages = JSON.parse(pagesJson);
          } catch {
            setMsg("ページ JSON の形式が不正です。");
            return;
          }
          if (!Array.isArray(pages) || pages.length === 0) {
            setMsg("pages は1枚以上の配列にしてください。");
            return;
          }
          const content_json = {
            version: 1,
            pages,
            meta: {
              researchField: researchField.trim(),
              category: category.trim(),
              academicMajor: "",
              academicMinor: "",
              coverImageUrl: pages[0] && pages[0].imageUrl ? pages[0].imageUrl : "",
            },
          };
          setBusy(true);
          setMsg("");
          try {
            const res = await fetch(apiUrl("/api/artworks"), {
              method: "POST",
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
              body: JSON.stringify({
                title: t,
                description: description.trim() || undefined,
                content_json,
              }),
            });
            const j = await res.json();
            if (!res.ok) {
              setMsg(j.error || "作成に失敗しました。");
            } else {
              setMsg("下書きを作成しました。一覧から公開できます。");
              setTitle("");
              setDescription("");
              setResearchField("");
              setCategory("");
              setPagesJson(defaultPagesJson);
              loadMine();
              if (onPublished) onPublished();
            }
          } catch {
            setMsg("ネットワークエラー");
          }
          setBusy(false);
        };

        const publishWork = async (id, pub) => {
          if (!token) return;
          setBusy(true);
          setMsg("");
          try {
            const res = await fetch(apiUrl(`/api/artworks/${encodeURIComponent(id)}`), {
              method: "PATCH",
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
              body: JSON.stringify({ is_published: pub }),
            });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) setMsg(j.error || "更新に失敗しました。");
            else {
              setMsg(pub ? "公開しました。" : "非公開にしました。");
              loadMine();
              if (onPublished) onPublished();
            }
          } catch {
            setMsg("ネットワークエラー");
          }
          setBusy(false);
        };

        if (!token) {
          return (
            <div style={{ minHeight: "100vh", background: "#0f1419", color: "#e8ecf4", padding: "2rem", fontFamily: 'Inter,"Helvetica Neue",Arial,sans-serif' }}>
              <button type="button" onClick={onBack} style={{ marginBottom: "1rem", padding: "0.5rem 0.9rem", borderRadius: "0.85rem", background: "rgba(255,255,255,0.08)", color: "#e8ecf4", border: "1px solid rgba(255,255,255,0.18)", cursor: "pointer", fontWeight: 900 }}>
                ← 戻る
              </button>
              <p style={{ color: "rgba(232,236,244,0.7)" }}>スタジオを使うにはログインしてください。</p>
            </div>
          );
        }

        return (
          <div style={{ minHeight: "100vh", background: "#0f1419", color: "#e8ecf4", fontFamily: 'Inter,"Helvetica Neue",Arial,sans-serif' }}>
            <header style={{ padding: "1rem 1.25rem", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", gap: "0.75rem", flexWrap: "wrap" }}>
              <button type="button" onClick={onBack} style={{ padding: "0.5rem 0.9rem", borderRadius: "0.85rem", background: "rgba(255,255,255,0.08)", color: "#e8ecf4", border: "1px solid rgba(255,255,255,0.18)", cursor: "pointer", fontWeight: 900 }}>
                ← 戻る
              </button>
              <span style={{ fontWeight: 1000, fontSize: "1.05rem" }}>スタジオ（著者）</span>
            </header>
            <div style={{ maxWidth: 720, margin: "0 auto", padding: "1.25rem 1rem 3rem" }}>
              <p style={{ color: "rgba(232,236,244,0.65)", lineHeight: 1.7, marginBottom: "1.25rem", fontSize: "0.92rem" }}>
                タイトルとページ画像 URL の JSON で下書きを作成し、準備ができたら公開します。公開後はカタログに載り、読者が閲覧できます。
              </p>
              {msg ? <div style={{ marginBottom: "1rem", padding: "0.65rem 0.85rem", borderRadius: "0.75rem", background: "rgba(34,197,94,0.12)", border: "1px solid rgba(34,197,94,0.3)", color: "#bbf7d0", fontWeight: 800 }}>{msg}</div> : null}

              <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.10)", borderRadius: "1rem", padding: "1rem 1.1rem", marginBottom: "1.5rem" }}>
                <div style={{ fontWeight: 1000, marginBottom: "0.75rem" }}>新規作品（下書き）</div>
                <label style={{ display: "block", fontSize: "0.85rem", marginBottom: "0.35rem", color: "rgba(232,236,244,0.75)" }}>タイトル</label>
                <input value={title} onChange={(e) => setTitle(e.target.value)} style={{ width: "100%", marginBottom: "0.65rem", padding: "0.55rem 0.65rem", borderRadius: "0.65rem", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", color: "#e8ecf4" }} />
                <label style={{ display: "block", fontSize: "0.85rem", marginBottom: "0.35rem", color: "rgba(232,236,244,0.75)" }}>あらすじ</label>

          { key: "B1_segment",       label: "B1 セクション分割",   pct: 20 },
          { key: "B2_chunk",         label: "B2 チャンク分割",     pct: 40 },

          { key: "completed",        label: "完了",                pct: 100 },

        const stageIndex = PIPELINE_STAGES.findIndex(s => s.key === pipeCurrentStage);
        const stagePct = stageIndex >= 0 ? PIPELINE_STAGES[stageIndex].pct : 5;
        const stageLabel = stageIndex >= 0 ? PIPELINE_STAGES[stageIndex].label : "処理開始中…";

          const timer = setInterval(async () => {
            try {
              const res = await fetch(apiUrl(`/api/ai/jobs/${pipeJobId}`));
              if (!res.ok) return;
              const data = await res.json();
              if (data.current_stage) setPipeCurrentStage(data.current_stage);
              if (data.status === "completed") {
                clearInterval(timer);
                setPipeResult(data.story_json || null);
                setPipeCurrentStage("completed");
                setTryStage("done");

                setTryError(data.error_message || "パイプライン処理に失敗しました。");

                setPipeJobId(null);

                              setTryPdfBusy(true);
                              setTryError("");
                              setTryPdfInfo("");
                              try {
                                // ① PDF.js でブラウザ内テキスト抽出（サーバー不要・即時）
                                const arrayBuf = await f.arrayBuffer();
                                // ArrayBuffer を Uint8Array にコピー（worker への所有権移転を防ぐ）
                                const uint8 = new Uint8Array(arrayBuf);
                                const pdfjsLib = window.pdfjsLib;
                                if (!pdfjsLib) throw new Error("PDF.js ライブラリ未ロード（ネット接続を確認）");
                                // Worker を同一スクリプトで設定（CORS 問題回避のため blob URL 化）
                                if (!pdfjsLib.GlobalWorkerOptions.workerSrc) {
                                  pdfjsLib.GlobalWorkerOptions.workerSrc =
                                    "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
                                }
                                const loadingTask = pdfjsLib.getDocument({ data: uint8 });
                                const pdf = await loadingTask.promise;
                                let fullText = "";
                                for (let i = 1; i <= pdf.numPages; i++) {
                                  const page = await pdf.getPage(i);
                                  const tc = await page.getTextContent();
                                  // TextItem は str と hasEOL を持つ、TextMarkedContent は str なし
                                  let pageText = "";
                                  for (const item of tc.items) {
                                    if ("str" in item) {
                                      pageText += item.str;
                                      pageText += item.hasEOL ? "\n" : " ";
                                    }
                                  }
                                  fullText += pageText;
                                }
                                const trimmed = fullText.trim();
                                if (!trimmed) throw new Error("テキストレイヤーが見つかりません（スキャンPDFは未対応）");

                                );

                                // ② PDF.js 失敗時: エラー内容を表示してサーバー API へフォールバック

                                  if (!f2) throw clientErr;
                                  const arrayBuf2 = await f2.arrayBuffer();
                                  const res = await fetch(apiUrl("/api/ai/pdf-text"), {

                                    headers: { "Content-Type": "application/pdf" },

      function AuthView({ onBackToHome, onAuthed }) {

        const [displayName, setDisplayName] = useState("");

        const [healthBusy, setHealthBusy] = useState(false);
        const [message, setMessage] = useState("");
        const [apiBaseUrlInput, setApiBaseUrlInput] = useState(() => {

          } catch {
            return "";
          }

          }
          setSessionTokenPresent(false);

        const submit = async () => {
          setBusy(true);
          setMessage("");
          try {
            const endpoint = mode === "login" ? "/api/login" : "/api/register";
            const payload =
              mode === "login"
                ? { email, password }
                : { email, password, display_name: displayName || null };

            const res = await fetch(apiUrl(endpoint), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            let json = {};
            try {
              const raw = await res.text();
              if (raw) json = JSON.parse(raw);
            } catch {
              /* 非JSON応答 */
            }
            const serverMsg = typeof json?.message === "string" ? json.message : "";
            if (!res.ok) {
              const hint =
                res.status === 401 || res.status === 403
                  ? "メール・パスワード・API接続先（#auth）を確認してください。"
                  : res.status >= 500
                    ? "サーバー側エラーです。しばらくしてから再度お試しください。"
                    : "";
              throw new Error(
                serverMsg ||
                  hint ||
                  (res.status ? `通信に失敗しました（HTTP ${res.status}）。API接続先を確認してください。` : "通信に失敗しました。")
              );
            }
            if (!json.ok) {
              throw new Error(serverMsg || "リクエストに失敗しました。入力内容を確認してください。");
            }

            if (mode === "register") {
              setMessage("登録しました。次はログインしてください。");
              setMode("login");
              return;
            }

            const token = json.access_token;
            if (!token) throw new Error("ログイン成功ですが access_token が返ってきませんでした。");

            // トークン保存（以降は API 進捗に切り替わる）
            try {
              localStorage.setItem("drcanvas:accessToken", token);
              const expSecs =
                typeof json.expires_in_secs === "number" && Number.isFinite(json.expires_in_secs)
                  ? json.expires_in_secs
                  : 86400;
              localStorage.setItem("drcanvas:accessTokenExpMs", String(Date.now() + expSecs * 1000));
            } catch {
              // ignore
            }
            setSessionTokenPresent(true);

            // Guest 進捗があれば API へベストエフォート同期（小規模 MVP 向け）
            const tokenSavedWorks = works.map(async (w) => {
              const guest = loadLastSpreadIndexGuest(w.id);
              if (!guest || guest <= 0) return;
              await saveLastSpreadIndex(w.id, guest);
            });
            await Promise.allSettled(tokenSavedWorks);

            setMessage("ログイン成功。進捗を同期しました。");
            onAuthed();
          } catch (e) {
            const msg = e?.message || "";
            const isNet =
              e?.name === "TypeError" ||
              /fetch|network|Failed to fetch|NetworkError/i.test(String(msg));
            setMessage(
              isNet
                ? "ネットワークエラーです。APIが起動しているか、#auth の「API接続先」（例: https://…fly.dev）を保存したか確認してください。"
                : msg || "エラーが発生しました。"
            );
          } finally {
            setBusy(false);
          }
        };

        const [sessionTokenPresent, setSessionTokenPresent] = useState(() => {
          try {
            return !!localStorage.getItem("drcanvas:accessToken");
          } catch {
            return false;
          }
        });

        const tokenExpiryHint = useMemo(() => {
          if (!sessionTokenPresent) return "";
          try {
            const raw = localStorage.getItem("drcanvas:accessTokenExpMs");
            if (!raw) return "";
            const exp = Number(raw);
            if (!Number.isFinite(exp)) return "";
            const remain = exp - Date.now();
            if (remain <= 0) return "アクセストークンの期限が切れている可能性があります。再ログインしてください。";
            if (remain < 3600000) return "約1時間以内にログイン期限が切れます。必要なら再ログインしてください。";
            if (remain < 86400000) return "24時間以内にログイン期限が切れます。";
            return "";
          } catch {
            return "";
          }
        }, [sessionTokenPresent, message]);

        const [stripeArtworkId, setStripeArtworkId] = useState("");
        const [stripeBusy, setStripeBusy] = useState(false);

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #e6f0fa 0%, #c5d9ed 40%, #192841 100%)", fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif' }}>
            <div style={{ maxWidth: 980, margin: "0 auto", padding: "2rem 1rem" }}>
              <div style={{ background: "rgba(255,255,255,0.88)", borderRadius: "1.35rem", padding: "1.6rem 1.75rem", boxShadow: "0 10px 40px rgba(25,40,65,0.08)", border: "1px solid rgba(25,40,65,0.06)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "1rem", flexWrap: "wrap" }}>
                  <button onClick={onBackToHome} style={{ padding: "0.6rem 0.9rem", borderRadius: "0.95rem", background: "rgba(255,255,255,0.85)", border: "1px solid rgba(25,40,65,0.12)", color: "#253358", cursor: "pointer", fontWeight: 1000 }}>
                    ← トップへ
                  </button>
                  {sessionTokenPresent && (
                    <button onClick={onLogout} style={{ padding: "0.6rem 0.9rem", borderRadius: "0.95rem", background: "rgba(37,51,88,0.10)", border: "1px solid rgba(37,51,88,0.20)", color: "#253358", cursor: "pointer", fontWeight: 1000 }}>
                      ログアウト
                    </button>
                  )}
                </div>

                <div style={{ marginTop: "1.1rem", display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                  <button onClick={() => setMode("login")} style={{ padding: "0.65rem 0.9rem", borderRadius: "1rem", border: mode === "login" ? "2px solid rgba(63,81,181,0.55)" : "1px solid rgba(37,51,88,0.20)", background: mode === "login" ? "rgba(63,81,181,0.12)" : "rgba(37,51,88,0.06)", color: "#253358", cursor: "pointer", fontWeight: 1100 }}>
                    ログイン
                  </button>
                  <button onClick={() => setMode("register")} style={{ padding: "0.65rem 0.9rem", borderRadius: "1rem", border: mode === "register" ? "2px solid rgba(63,81,181,0.55)" : "1px solid rgba(37,51,88,0.20)", background: mode === "register" ? "rgba(63,81,181,0.12)" : "rgba(37,51,88,0.06)", color: "#253358", cursor: "pointer", fontWeight: 1100 }}>
                    新規登録
                  </button>
                </div>

                <div style={{ marginTop: "1rem", padding: "0.95rem 1rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.12)", background: "rgba(25,40,65,0.04)" }}>
                  <div style={{ fontWeight: 1100, color: "#253358", marginBottom: "0.45rem" }}>API 接続先（案A: Fly.io）</div>
                  <div style={{ color: "#5a6c87", fontWeight: 800, lineHeight: 1.7, fontSize: "0.95rem", marginBottom: "0.65rem" }}>
                    例: <span style={{ fontFamily: "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" }}>https://drcanvas-api.fly.dev</span>
                  </div>
                  <div style={{ display: "flex", gap: "0.6rem", flexWrap: "wrap" }}>
                    <input
                      value={apiBaseUrlInput}
                      onChange={(e) => setApiBaseUrlInput(e.target.value)}
                      placeholder="未設定なら同一オリジン / ローカル推定"
                      style={{ flex: "1 1 420px", padding: "0.85rem 0.95rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.16)", background: "#fff", outline: "none" }}
                    />
                    <button
                      onClick={() => {
                        setApiBaseUrl(apiBaseUrlInput.trim());
                        setMessage("API接続先を保存しました。");
                      }}
                      style={{ padding: "0.85rem 1rem", borderRadius: "1rem", background: "rgba(34,197,94,0.16)", border: "1px solid rgba(34,197,94,0.35)", color: "#253358", cursor: "pointer", fontWeight: 1100 }}
                    >
                      保存
                    </button>
                    <button
                      type="button"
                      disabled={healthBusy}
                      onClick={async () => {
                        setHealthBusy(true);
                        setMessage("");
                        try {
                          const r = await fetchApiHealth(apiBaseUrlInput);
                          setMessage(r.ok ? r.message : `接続テスト: ${r.message}`);
                        } catch (e) {
                          setMessage(`接続テスト失敗: ${e?.message || "unknown"}`);

                      style={{
                        padding: "0.85rem 1rem",
                        borderRadius: "1rem",
                        background: healthBusy ? "rgba(37,51,88,0.12)" : "rgba(63,81,181,0.12)",
                        border: "1px solid rgba(63,81,181,0.35)",
                        color: "#253358",
                        cursor: healthBusy ? "wait" : "pointer",
                        fontWeight: 1100,
                      }}
                    >
                      {healthBusy ? "確認中…" : "接続テスト（/health）"}
                    </button>
                  </div>
                  {tokenExpiryHint ? (

                      {tokenExpiryHint}
                    </div>
                  ) : null}
                </div>

                {sessionTokenPresent ? (
                  <div
                    style={{
                      marginTop: "1rem",
                      padding: "0.95rem 1rem",
                      borderRadius: "1rem",
                      border: "1px solid rgba(25,40,65,0.14)",

                          fontSize: "0.9rem",
                        }}
                      />
                      <button

                        disabled={stripeBusy || !stripeArtworkId.trim()}
                        onClick={async () => {
                          const token = getAccessToken();

                          try {

                                "Content-Type": "application/json",

                              body: JSON.stringify({ artwork_id: stripeArtworkId.trim() }),

                            const data = await res.json().catch(() => ({}));
                            if (!res.ok || !data.ok || !data.checkout_url) {
                              throw new Error(data?.message || `HTTP ${res.status}`);

                            window.location.href = data.checkout_url;
                          } catch (e) {
                            setMessage(e?.message || "Checkout の開始に失敗しました。");

                            setStripeBusy(false);
                          }

                        style={{
                          padding: "0.75rem 1rem",
                          borderRadius: "0.9rem",
                          background: stripeBusy || !stripeArtworkId.trim() ? "rgba(34,197,94,0.2)" : "linear-gradient(135deg, #22c55e 0%, #16a34a 100%)",
                          border: "none",
                          color: "#06210f",
                          fontWeight: 1100,
                          cursor: stripeBusy || !stripeArtworkId.trim() ? "not-allowed" : "pointer",
                        }}
                      >
                        {stripeBusy ? "処理中…" : "購入ページへ"}
                      </button>
                    </div>
                  </div>
                ) : null}

                <div style={{ marginTop: "1.1rem", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.9rem" }}>
                  <div style={{ gridColumn: "span 2" }}>
                    <label style={{ display: "block", fontWeight: 1000, color: "#253358", marginBottom: "0.35rem" }}>メール</label>
                    <input value={email} onChange={(e) => setEmail(e.target.value)} type="email" placeholder="name@example.com" style={{ width: "100%", padding: "0.85rem 0.95rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.16)", background: "#fff", outline: "none" }} />
                  </div>
                  <div style={{ gridColumn: "span 2" }}>
                    <label style={{ display: "block", fontWeight: 1000, color: "#253358", marginBottom: "0.35rem" }}>パスワード</label>
                    <input value={password} onChange={(e) => setPassword(e.target.value)} type="password" placeholder="8文字以上" style={{ width: "100%", padding: "0.85rem 0.95rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.16)", background: "#fff", outline: "none" }} />
                  </div>
                  {mode === "register" && (
                    <div style={{ gridColumn: "span 2" }}>
                      <label style={{ display: "block", fontWeight: 1000, color: "#253358", marginBottom: "0.35rem" }}>表示名（任意）</label>
                      <input value={displayName} onChange={(e) => setDisplayName(e.target.value)} type="text" placeholder="Dr. Takuro" style={{ width: "100%", padding: "0.85rem 0.95rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.16)", background: "#fff", outline: "none" }} />
                    </div>
                  )}
                </div>

                {message && (
                  <div style={{ marginTop: "1rem", padding: "0.9rem 1rem", borderRadius: "1rem", border: "1px solid rgba(25,40,65,0.14)", background: "rgba(255,255,255,0.78)", color: "#253358", fontWeight: 900 }}>
                    {message}
                  </div>
                )}

                <div style={{ marginTop: "1.1rem", display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                  <button
                    disabled={busy}
                    onClick={submit}
                    style={{
                      flex: "1 1 260px",
                      padding: "1rem 1.1rem",
                      fontSize: "1.05rem",
                      fontWeight: 1100,
                      color: "#fff",
                      background: busy ? "rgba(63,81,181,0.35)" : "linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%)",
                      border: "none",
                      borderRadius: "1rem",
                      cursor: busy ? "not-allowed" : "pointer",
                      boxShadow: "0 8px 30px rgba(63,81,181,0.35)",
                    }}
                  >
                    {busy ? "処理中…" : mode === "login" ? "ログイン" : "登録"}
                  </button>
                  {mode === "login" && (
                    <button onClick={() => setMode("register")} style={{ flex: "1 1 220px", padding: "1rem 1.1rem", fontSize: "1.02rem", fontWeight: 1100, color: "#253358", background: "rgba(37,51,88,0.08)", border: "2px solid rgba(37,51,88,0.20)", borderRadius: "1rem", cursor: "pointer" }}>
                      新規登録へ
                    </button>
                  )}
                </div>

                <div style={{ marginTop: "1rem", color: "#5a6c87", lineHeight: 1.8, fontWeight: 800 }}>
                  注意: このUIは MVP です。進捗はログイン後にユーザー別APIへ保存されます。
                </div>
              </div>
            </div>
          </div>
        );
      }

      function WorksView({ onBackToHome, onSelectWork, onOpenDashboard, onOpenStudio, mergedWorks }) {
        const list = mergedWorks || works;
        const pageCount = mangaPages.length;
        const maxSpreadIndex = getMaxSpreadIndex(pageCount);
        const [activeCategory, setActiveCategory] = useState("ALL");
        const [activeMajor, setActiveMajor] = useState("ALL");
        const [activeMinor, setActiveMinor] = useState("ALL");
        const [query, setQuery] = useState("");
        const [progressBanner, setProgressBanner] = useState(() => readProgressSyncNote());
        const [progressByWorkId, setProgressByWorkId] = useState(() => {
          const obj = {};
          list.forEach((w) => {
            obj[w.id] = loadLastSpreadIndexGuest(w.id);
          });
          return obj;
        });

        const categories = useMemo(() => ["ALL", ...workCategoryPool], []);
        const academicMajors = useMemo(() => ["ALL", ...academicMajorPool], []);

        const filteredWorks = useMemo(() => {
          const q = query.trim().toLowerCase();
          return list.filter((w) => {
            const inCat = activeCategory === "ALL" ? true : w.category === activeCategory;
            if (!inCat) return false;
            const inMajor = activeMajor === "ALL" ? true : w.academicMajor === activeMajor;
            if (!inMajor) return false;
            const inMinor = activeMinor === "ALL" ? true : w.academicMinor === activeMinor;
            if (!inMinor) return false;
            if (!q) return true;
            return (
              w.title.toLowerCase().includes(q) ||
              (w.researchField || "").toLowerCase().includes(q) ||
              (w.category || "").toLowerCase().includes(q) ||
              (w.academicMajor || "").toLowerCase().includes(q) ||
              (w.academicMinor || "").toLowerCase().includes(q)
            );
          });
        }, [activeCategory, activeMajor, activeMinor, query, list]);

        const recommendedWorks = useMemo(() => {
          // MVP: 運営ピックアップ枠（固定ルールで上位数件を選ぶ）
          const base = activeCategory === "ALL" ? list : list.filter((w) => w.category === activeCategory);
          return base.slice(0, 4);
        }, [activeCategory, list]);

        const popularWorks = useMemo(() => {
          // MVP: 人気枠（進捗が進んでいる=読まれている想定でソート）
          const base = activeCategory === "ALL" ? list : list.filter((w) => w.category === activeCategory);
          return [...base].sort((a, b) => (progressByWorkId[b.id] ?? 0) - (progressByWorkId[a.id] ?? 0)).slice(0, 6);
        }, [activeCategory, progressByWorkId, list]);

        useEffect(() => {
          let alive = true;
          (async () => {
            const next = {};
            for (const w of list) {
              const saved = await loadLastSpreadIndex(w.id);
              next[w.id] = clamp(saved, 0, maxSpreadIndex);
            }
            if (alive) setProgressByWorkId(next);
          })();
          return () => {
            alive = false;
          };
        }, [maxSpreadIndex, list]);

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #06110b 0%, #0b1a12 45%, #06110b 100%)", fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif' }}>
            <div style={{ position: "sticky", top: 0, zIndex: 10, background: "rgba(15,20,25,0.75)", backdropFilter: "blur(10px)", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
              <div style={{ maxWidth: 980, margin: "0 auto", padding: "0.8rem 1rem", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <button onClick={onBackToHome} style={{ padding: "0.55rem 0.85rem", borderRadius: "0.9rem", background: "rgba(255,255,255,0.08)", color: "#e8ecf4", border: "1px solid rgba(255,255,255,0.18)", cursor: "pointer", fontWeight: 1000 }}>
                  ← トップへ
                </button>
                <div style={{ color: "rgba(255,255,255,0.7)", fontWeight: 900 }}>作品の閲覧</div>
                <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
                  {onOpenStudio && getAccessToken() && (
                    <button type="button" onClick={onOpenStudio} style={{ padding: "0.55rem 0.85rem", borderRadius: "0.9rem", background: "rgba(234,179,8,0.14)", color: "#facc15", border: "1px solid rgba(234,179,8,0.35)", cursor: "pointer", fontWeight: 900 }}>
                      ✒️ スタジオ
                    </button>
                  )}
                  {onOpenDashboard && getAccessToken() && (
                    <button onClick={onOpenDashboard} style={{ padding: "0.55rem 0.85rem", borderRadius: "0.9rem", background: "rgba(34,197,94,0.12)", color: "#4ade80", border: "1px solid rgba(34,197,94,0.3)", cursor: "pointer", fontWeight: 900 }}>
                      📖 マイページ
                    </button>
                  )}
                </div>
              </div>
            </div>

            {progressBanner ? (
              <div
                style={{
                  maxWidth: 1180,
                  margin: "0 auto",
                  padding: "0.65rem 1rem 0",
                  boxSizing: "border-box",
                }}
              >
                <div
                  style={{
                    display: "flex",
                    alignItems: "flex-start",
                    justifyContent: "space-between",
                    gap: "0.75rem",
                    flexWrap: "wrap",
                    padding: "0.85rem 1rem",
                    borderRadius: "0.9rem",
                    background: "rgba(251,191,36,0.14)",
                    border: "1px solid rgba(251,191,36,0.45)",
                    color: "#fef3c7",
                    fontWeight: 800,
                    lineHeight: 1.65,
                  }}
                >
                  <span style={{ flex: "1 1 280px" }}>{progressBanner}</span>
                  <button
                    type="button"
                    onClick={() => {
                      clearProgressSyncNote();
                      setProgressBanner("");
                    }}
                    style={{
                      flex: "0 0 auto",
                      padding: "0.45rem 0.75rem",
                      borderRadius: "0.65rem",
                      border: "1px solid rgba(255,255,255,0.25)",
                      background: "rgba(0,0,0,0.2)",
                      color: "#fff",
                      cursor: "pointer",
                      fontWeight: 900,
                    }}
                  >
                    閉じる
                  </button>
                </div>
              </div>
            ) : null}

            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "1rem 1rem 3rem", display: "flex", gap: "1rem", alignItems: "flex-start" }}>
              {/* 左ナビ（ルーキー風） */}
              <aside style={{ flex: "0 0 260px", position: "sticky", top: 68, alignSelf: "flex-start" }}>
                <div style={{ background: "rgba(0,0,0,0.25)", border: "1px solid rgba(255,255,255,0.10)", borderRadius: 16, padding: "0.9rem 0.9rem" }}>
                  <div style={{ color: "rgba(234,248,239,0.9)", fontWeight: 1100, marginBottom: "0.6rem" }}>カテゴリ</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                    {categories.map((c) => (
                      <button
                        key={c}
                        onClick={() => setActiveCategory(c)}
                        style={{
                          textAlign: "left",
                          padding: "0.55rem 0.7rem",
                          borderRadius: 12,
                          border: activeCategory === c ? "1px solid rgba(34,197,94,0.50)" : "1px solid rgba(255,255,255,0.10)",
                          background: activeCategory === c ? "rgba(34,197,94,0.16)" : "rgba(255,255,255,0.05)",
                          color: activeCategory === c ? "#eaf8ef" : "rgba(234,248,239,0.78)",
                          cursor: "pointer",
                          fontWeight: 1000,
                        }}
                      >
                        {c === "ALL" ? "すべて" : c}
                      </button>
                    ))}
                  </div>

                  <div style={{ marginTop: "0.9rem", color: "rgba(234,248,239,0.9)", fontWeight: 1100, marginBottom: "0.6rem" }}>学術テーマ</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.55rem" }}>
                    <button
                      onClick={() => {
                        setActiveMajor("ALL");
                        setActiveMinor("ALL");
                      }}
                      style={{
                        textAlign: "left",
                        padding: "0.55rem 0.7rem",
                        borderRadius: 12,
                        border: activeMajor === "ALL" ? "1px solid rgba(34,197,94,0.50)" : "1px solid rgba(255,255,255,0.10)",
                        background: activeMajor === "ALL" ? "rgba(34,197,94,0.16)" : "rgba(255,255,255,0.05)",

                  {filteredWorks.map((w) => {
