<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoctorCanvas - Quantumy</title>
  <style>html { scroll-behavior: smooth; }</style>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const doctorProfile = {
      name: '博士漫画家',
      degree: 'Ph.D. in Physics',
      field: '量子情報・量子もつれ',
      avatarUrl: 'https://dummyimage.com/160x160/253358/ffe03a&text=DR', // 作家アイコン（差し替え可）
    };

    const mangaPages = [
      { imageUrl: 'https://dummyimage.com/600x900/ebf5fb/333&text=1', pageNumber: 1 },
      { imageUrl: 'https://dummyimage.com/600x900/d6eaf8/333&text=2', pageNumber: 2 },
      { imageUrl: 'https://dummyimage.com/600x900/aed6f1/333&text=3', pageNumber: 3 },
    ];

    const references = [
      {
        title: "Quantum Entanglement and Information",
        author: "A. Einstein, B. Podolsky, N. Rosen",
        doi: "10.1103/PhysRev.47.777",
        summary: "量子力学における相関した二粒子系について、局所実在論との矛盾を指摘した古典的論文。のちのEPRパラドックスとして知られ、量子情報の基礎づけに影響を与えた。"
      },
      {
        title: "A New Kind of Science",
        author: "Stephen Wolfram",
        doi: "10.5555/nks.123456",
        summary: "単純なルールから複雑な振る舞いが生まれるセルオートマトン等を扱う。計算論的な視点から自然界の複雑系を探求し、科学の新しい枠組みを提唱している。"
      },
    ];

    function scrollToManga() {
      document.getElementById('manga-viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function scrollToId(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function scrollToDemo() {
      scrollToId('demo-section');
    }

    function scrollToTryAi() {
      scrollToId('try-ai');
    }

    function scrollToRegisterViewer() {
      scrollToId('register-viewer');
    }

    function scrollToRegisterResearcher() {
      scrollToId('register-researcher');
    }

    function scrollToTerms() {
      scrollToId('terms');
    }

    function DoctorCanvas() {
      const [currentPage, setCurrentPage] = useState(0);
      const [viewMode, setViewMode] = useState('intro'); // 'intro' | 'fullscreen'

      const [tryStage, setTryStage] = useState('idle'); // 'idle' | 'generating' | 'done'
      const [tryFileName, setTryFileName] = useState('');
      const [tryResultText, setTryResultText] = useState('');

      const nextPage = () => setCurrentPage((prev) => (prev < mangaPages.length - 1 ? prev + 1 : prev));
      const prevPage = () => setCurrentPage((prev) => (prev > 0 ? prev - 1 : prev));

      // 全画面漫画専用ビューワー
      if (viewMode === 'fullscreen') {
        return (
          <div style={{
            position: 'fixed',
            inset: 0,
            zIndex: 9999,
            background: '#0f1419',
            display: 'flex',
            flexDirection: 'column',
            fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif'
          }}>
            <header style={{
              flex: '0 0 auto',
              padding: '0.75rem 1rem',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              background: 'rgba(0,0,0,0.5)',
              borderBottom: '1px solid rgba(255,255,255,0.08)'
            }}>
              <button
                onClick={() => setViewMode('intro')}
                style={{
                  padding: '0.5rem 1rem',
                  fontSize: '0.9rem',
                  color: '#e8ecf4',
                  background: 'rgba(255,255,255,0.1)',
                  border: '1px solid rgba(255,255,255,0.2)',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontWeight: 500
                }}
              >
                ← 紹介に戻る
              </button>
              <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.9rem' }}>
                {currentPage + 1} / {mangaPages.length}
              </span>
            </header>
            <div style={{
              flex: 1,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: '1rem',
              minHeight: 0
            }}>
              <button
                aria-label="前のページ"
                onClick={prevPage}
                disabled={currentPage === 0}
                style={{
                  flex: '0 0 auto',
                  background: 'rgba(255,255,255,0.08)',
                  border: 'none',
                  color: '#fff',
                  fontSize: '2.5rem',
                  width: '56px',
                  height: '56px',
                  borderRadius: '50%',
                  cursor: currentPage === 0 ? 'not-allowed' : 'pointer',
                  opacity: currentPage === 0 ? 0.3 : 0.9,
                  marginRight: '1rem'
                }}
              >
                ‹
              </button>
              <img
                src={mangaPages[currentPage].imageUrl}
                alt={`Page ${currentPage + 1}`}
                style={{
                  maxWidth: '100%',
                  maxHeight: '100%',
                  objectFit: 'contain',
                  borderRadius: '4px',
                  boxShadow: '0 8px 40px rgba(0,0,0,0.4)'
                }}
              />
              <button
                aria-label="次のページ"
                onClick={nextPage}
                disabled={currentPage >= mangaPages.length - 1}
                style={{
                  flex: '0 0 auto',
                  background: 'rgba(255,255,255,0.08)',
                  border: 'none',
                  color: '#fff',
                  fontSize: '2.5rem',
                  width: '56px',
                  height: '56px',
                  borderRadius: '50%',
                  cursor: currentPage >= mangaPages.length - 1 ? 'not-allowed' : 'pointer',
                  opacity: currentPage >= mangaPages.length - 1 ? 0.3 : 0.9,
                  marginLeft: '1rem'
                }}
              >
                ›
              </button>
            </div>
          </div>
        );
      }

      // 紹介ページ
      return (
        <div style={{
          display: 'flex',
          flexDirection: 'column',
          minHeight: '100vh',
          background: 'linear-gradient(180deg, #e6f0fa 0%, #c5d9ed 40%, #192841 100%)',
          fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif'
        }}>
          {/* ホーム */}
          <section id="home" style={{
            padding: '4rem 2rem 2.75rem',
            maxWidth: '960px',
            margin: '0 auto',
            width: '100%',
            boxSizing: 'border-box'
          }}>
            <div style={{
              background: 'rgba(255,255,255,0.85)',
              borderRadius: '1.25rem',
              padding: '2.25rem 2.1rem',
              boxShadow: '0 10px 40px rgba(25,40,65,0.10)',
              border: '1px solid rgba(25,40,65,0.06)'
            }}>
              <div style={{ display: 'flex', gap: '1.25rem', alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <div style={{ flex: '1 1 320px', minWidth: 260 }}>
                  <div style={{
                    display: 'inline-flex',
                    alignItems: 'center',
                    gap: '0.55rem',
                    padding: '0.4rem 0.75rem',
                    borderRadius: '999px',
                    background: 'rgba(63,81,181,0.10)',
                    color: '#253358',
                    fontWeight: 700,
                    marginBottom: '1rem'
                  }}>
                    <span style={{ fontSize: '1.1rem' }}>📚</span>
                    Dr.CANVAS
                  </div>
                  <h1 style={{
                    fontSize: '2.05rem',
                    color: '#192841',
                    margin: '0 0 0.75rem 0',
                    fontWeight: 900,
                    letterSpacing: '0.01em'
                  }}>
                    研究者の「論文」を、マンガの「コマ」へ。
                  </h1>
                  <p style={{
                    margin: 0,
                    color: '#3d4f6b',
                    lineHeight: 1.8,
                    fontSize: '1.04rem'
                  }}>
                    まずは体験。あなたの「知りたい」を、物語として読む。
                  </p>
                </div>

                <div style={{ flex: '0 0 320px', maxWidth: 420 }}>
                  <div style={{
                    background: 'rgba(25,40,65,0.05)',
                    borderRadius: '1rem',
                    padding: '1.25rem 1.15rem',
                    border: '1px solid rgba(25,40,65,0.06)'
                  }}>
                    <h2 style={{ margin: 0, fontSize: '1.05rem', color: '#253358', fontWeight: 800, marginBottom: '0.75rem' }}>
                      2つの入口
                    </h2>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                      <div style={{
                        background: '#fff',
                        borderRadius: '0.9rem',
                        padding: '0.85rem 0.9rem',
                        border: '1px solid rgba(25,40,65,0.06)'
                      }}>
                        <div style={{ fontWeight: 900, color: '#192841', marginBottom: '0.2rem' }}>
                          👤 漫画読者
                        </div>
                        <div style={{ color: '#5a6c87', fontSize: '0.95rem', lineHeight: 1.6 }}>
                          未ログインでも閲覧できます。SEOを意識した高速取得。
                        </div>
                      </div>
                      <div style={{
                        background: '#fff',
                        borderRadius: '0.9rem',
                        padding: '0.85rem 0.9rem',
                        border: '1px solid rgba(25,40,65,0.06)'
                      }}>
                        <div style={{ fontWeight: 900, color: '#192841', marginBottom: '0.2rem' }}>
                          🧑‍🏫 研究者（投稿）
                        </div>
                        <div style={{ color: '#5a6c87', fontSize: '0.95rem', lineHeight: 1.6 }}>
                          学生証/教職員証で本人確認が必要です（モックUI）。
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* メインCTA */}
              <div style={{ display: 'flex', gap: '1rem', alignItems: 'center', flexWrap: 'wrap', marginTop: '1.9rem' }}>
                <button
                  onClick={scrollToDemo}
                  style={{
                    flex: '1 1 240px',
                    padding: '1rem 1.25rem',
                    fontSize: '1.15rem',
                    fontWeight: 900,
                    color: '#fff',
                    background: 'linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%)',
                    border: 'none',
                    borderRadius: '1rem',
                    cursor: 'pointer',
                    boxShadow: '0 8px 30px rgba(63,81,181,0.35)'
                  }}
                >
                  デモを見る →
                </button>
                <button
                  onClick={scrollToTryAi}
                  style={{
                    flex: '1 1 240px',
                    padding: '1rem 1.25rem',
                    fontSize: '1.05rem',
                    fontWeight: 800,
                    color: '#253358',
                    background: 'rgba(37,51,88,0.08)',
                    border: '2px solid rgba(37,51,88,0.20)',
                    borderRadius: '1rem',
                    cursor: 'pointer'
                  }}
                >
                  お試しで論文→漫画生成AI（モック） →
                </button>
              </div>

              {/* 必須リンク */}
              <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap', marginTop: '1.25rem' }}>
                <button
                  onClick={scrollToRegisterResearcher}
                  style={{
                    padding: '0.65rem 0.9rem',
                    fontSize: '0.95rem',
                    fontWeight: 800,
                    color: '#253358',
                    background: '#fff',
                    border: '1px solid rgba(37,51,88,0.18)',
                    borderRadius: '999px',
                    cursor: 'pointer'
                  }}
                >
                  研究者としてアカウント登録 →
                </button>
                <button
                  onClick={scrollToRegisterViewer}
                  style={{
                    padding: '0.65rem 0.9rem',
                    fontSize: '0.95rem',
                    fontWeight: 800,
                    color: '#253358',
                    background: '#fff',
                    border: '1px solid rgba(37,51,88,0.18)',
                    borderRadius: '999px',
                    cursor: 'pointer'
                  }}
                >
                  漫画読者としてアカウント登録 →
                </button>
                <a
                  href="mailto:hello@quantumy.example"
                  style={{
                    padding: '0.65rem 0.9rem',
                    fontSize: '0.95rem',
                    fontWeight: 800,
                    color: '#253358',
                    background: '#fff',
                    border: '1px solid rgba(37,51,88,0.18)',
                    borderRadius: '999px',
                    textDecoration: 'none',
                    display: 'inline-block'
                  }}
                >
                  お問い合わせ →
                </a>
                <button
                  onClick={scrollToTerms}
                  style={{
                    padding: '0.65rem 0.9rem',
                    fontSize: '0.95rem',
                    fontWeight: 800,
                    color: '#253358',
                    background: '#fff',
                    border: '1px solid rgba(37,51,88,0.18)',
                    borderRadius: '999px',
                    cursor: 'pointer'
                  }}
                >
                  利用規約 →
                </button>
              </div>
            </div>
          </section>

          {/* 既存のデモ（博士紹介＋漫画） */}
          <section id="demo-section" style={{
            padding: '3rem 2rem 2.5rem',
            maxWidth: '720px',
            margin: '0 auto',
            width: '100%',
            boxSizing: 'border-box'
          }}>
            <h1 style={{
              fontSize: '1.75rem',
              color: '#192841',
              marginBottom: '1.5rem',
              fontWeight: 700,
              letterSpacing: '0.02em'
            }}>
              博士号所持の漫画家 — 論文と漫画
            </h1>

            {/* プロフィール: 左に作家アイコン（丸）、右にテキスト */}
            <div style={{
              display: 'flex',
              alignItems: 'center',
              gap: '1.5rem',
              background: 'rgba(255,255,255,0.85)',
              borderRadius: '1rem',
              padding: '1.5rem 1.75rem',
              marginBottom: '1.75rem',
              boxShadow: '0 4px 20px rgba(25,40,65,0.08)',
              border: '1px solid rgba(25,40,65,0.06)'
            }}>
              <div style={{
                flexShrink: 0,
                width: '96px',
                height: '96px',
                borderRadius: '50%',
                overflow: 'hidden',
                border: '3px solid #253358',
                boxShadow: '0 4px 12px rgba(25,40,65,0.15)'
              }}>
                <img
                  src={doctorProfile.avatarUrl}
                  alt={doctorProfile.name}
                  style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                />
              </div>
              <div style={{ minWidth: 0 }}>
                <h2 style={{ fontSize: '1.1rem', color: '#253358', marginBottom: '0.5rem', fontWeight: 600 }}>プロフィール</h2>
                <p style={{ margin: 0, fontSize: '1rem', color: '#3d4f6b', lineHeight: 1.6 }}>
                  <strong>{doctorProfile.name}</strong><br />
                  {doctorProfile.degree}<br />
                  研究分野: {doctorProfile.field}
                </p>
              </div>
            </div>

            <h2 style={{
              fontSize: '1.15rem',
              color: '#253358',
              marginBottom: '1rem',
              fontWeight: 600
            }}>
              論文 Summary
            </h2>
            {references.map((ref) => (
              <div
                key={ref.doi}
                style={{
                  background: 'rgba(255,255,255,0.9)',
                  borderRadius: '0.75rem',
                  padding: '1rem 1.25rem',
                  marginBottom: '1rem',
                  boxShadow: '0 2px 12px rgba(25,40,65,0.06)',
                  border: '1px solid rgba(25,40,65,0.05)'
                }}
              >
                <div style={{ fontWeight: 600, fontSize: '1rem', color: '#192841', marginBottom: '0.35rem' }}>{ref.title}</div>
                <div style={{ fontSize: '0.9rem', color: '#5a6c87', marginBottom: '0.5rem' }}>{ref.author}</div>
                <p style={{ fontSize: '0.95rem', color: '#3d4f6b', lineHeight: 1.6, margin: '0 0 0.75rem 0' }}>
                  {ref.summary}
                </p>
                <a
                  href={`https://doi.org/${ref.doi}`}
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{
                    display: 'inline-block',
                    padding: '0.5rem 1rem',
                    background: '#253358',
                    color: '#e8ecf4',
                    borderRadius: '8px',
                    fontSize: '0.9rem',
                    textDecoration: 'none',
                    fontWeight: 500
                  }}
                >
                  論文へ (DOI)
                </a>
              </div>
            ))}

            {/* 漫画本編を全画面で読む — 論文Summaryのすぐ下・目立つCTA */}
            <button
              onClick={() => setViewMode('fullscreen')}
              style={{
                display: 'block',
                width: '100%',
                maxWidth: '420px',
                margin: '0 auto 1.25rem',
                padding: '1.1rem 1.5rem',
                fontSize: '1.15rem',
                fontWeight: 700,
                color: '#fff',
                background: 'linear-gradient(135deg, #192841 0%, #253358 50%, #3f51b5 100%)',
                border: 'none',
                borderRadius: '1rem',
                cursor: 'pointer',
                boxShadow: '0 6px 24px rgba(25,40,65,0.35)',
                transition: 'transform 0.15s, box-shadow 0.15s'
              }}
              onMouseOver={(e) => { e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.boxShadow = '0 8px 28px rgba(25,40,65,0.45)'; }}
              onMouseOut={(e) => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 24px rgba(25,40,65,0.35)'; }}
            >
              漫画本編を全画面で読む
            </button>

            <button
              onClick={scrollToManga}
              style={{
                display: 'block',
                width: '100%',
                maxWidth: '360px',
                margin: '0 auto',
                padding: '0.9rem 1.25rem',
                fontSize: '1rem',
                fontWeight: 600,
                color: '#3f51b5',
                background: 'rgba(255,255,255,0.9)',
                border: '2px solid #3f51b5',
                borderRadius: '1rem',
                cursor: 'pointer',
                transition: 'transform 0.15s, box-shadow 0.15s'
              }}
              onMouseOver={(e) => { e.currentTarget.style.transform = 'scale(1.01)'; }}
              onMouseOut={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
            >
              漫画本編へ進む（スクロール） →
            </button>
          </section>

          {/* 漫画ビューワー（同一ページ内） */}
          <section
            id="manga-viewer"
            style={{
              display: 'flex',
              flex: 1,
              minHeight: '100vh',
              alignItems: 'stretch'
            }}
          >
            <div style={{
              flex: 1,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: '2rem',
            }}>
              <button
                aria-label="前のページ"
                onClick={prevPage}
                disabled={currentPage === 0}
                style={{
                  background: 'none',
                  border: 'none',
                  color: '#3f51b5',
                  fontSize: '2rem',
                  cursor: currentPage === 0 ? 'not-allowed' : 'pointer',
                  opacity: currentPage === 0 ? 0.3 : 1,
                  marginRight: '1.5rem'
                }}
              >
                ‹
              </button>
              <img
                src={mangaPages[currentPage].imageUrl}
                alt={`Manga Page ${currentPage + 1}`}
                style={{
                  boxShadow: '0 6px 32px 0 rgba(25,40,65,.23)',
                  borderRadius: '1rem',
                  border: '2px solid #b2bec3',
                  maxWidth: '420px',
                  width: '100%',
                  height: 'auto',
                  background: '#fff',
                  transition: 'box-shadow 0.2s'
                }}
              />
              <button
                aria-label="次のページ"
                onClick={nextPage}
                disabled={currentPage >= mangaPages.length - 1}
                style={{
                  background: 'none',
                  border: 'none',
                  color: '#3f51b5',
                  fontSize: '2rem',
                  cursor: currentPage >= mangaPages.length - 1 ? 'not-allowed' : 'pointer',
                  opacity: currentPage >= mangaPages.length - 1 ? 0.3 : 1,
                  marginLeft: '1.5rem'
                }}
              >
                ›
              </button>
            </div>
            <aside style={{
              width: '340px',
              background: '#253358EF',
              color: '#f2f6fa',
              padding: '2.5rem 2rem',
              boxShadow: '-1px 0 8px 0 rgba(25,40,65,.04)',
              display: 'flex',
              flexDirection: 'column',
              justifyContent: 'flex-start',
              borderTopLeftRadius: '1.5rem',
              borderBottomLeftRadius: '1.5rem'
            }}>
              <h2 style={{
                fontSize: '1.3rem',
                letterSpacing: '0.04em',
                marginBottom: '1.2rem',
                fontWeight: 700,
                color: '#ffe03a'
              }}>
                📚 論文出典 (References)
              </h2>
              <ul style={{ listStyle: 'none', padding: 0 }}>
                {references.map((ref, i) => (
                  <li
                    key={ref.doi}
                    style={{
                      marginBottom: '1.3rem',
                      background: i % 2 === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.10)',
                      borderRadius: '10px',
                      padding: '0.8rem 1rem',
                      transition: 'background 0.2s',
                    }}
                  >
                    <div style={{ fontWeight: 600, fontSize: '1.05rem', marginBottom: '0.1em', color: '#dbeafe' }}>
                      {ref.title}
                    </div>
                    <div style={{ fontSize: '0.96rem', color: '#d2ceee', marginBottom: '0.2em' }}>
                      <span style={{ fontWeight: 450 }}>{ref.author}</span>
                    </div>
                    <div style={{ fontSize: '0.91rem' }}>
                      <a
                        href={`https://doi.org/${ref.doi}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{ color: '#91d6fe', textDecoration: 'underline dotted' }}
                      >
                        DOI: {ref.doi}
                      </a>
                    </div>
                  </li>
                ))}
              </ul>
              <footer style={{ marginTop: 'auto', fontSize: '13px', color: '#b2bec3', paddingTop: '1.3rem' }}>
                <span style={{ color: '#ccffff' }}>Quantumy Doctor Canvas</span> (Phase 1)
              </footer>
            </aside>
          </section>

          {/* お試し: 論文アップロード→漫画生成AI（モック） */}
          <section id="try-ai" style={{
            padding: '3.25rem 2rem 2.5rem',
            maxWidth: '960px',
            margin: '0 auto',
            width: '100%',
            boxSizing: 'border-box'
          }}>
            <div style={{
              background: 'rgba(255,255,255,0.88)',
              borderRadius: '1.25rem',
              padding: '1.8rem 1.75rem',
              boxShadow: '0 10px 40px rgba(25,40,65,0.08)',
              border: '1px solid rgba(25,40,65,0.06)'
            }}>
              <h2 style={{ fontSize: '1.35rem', color: '#253358', margin: '0 0 0.75rem 0', fontWeight: 900 }}>
                お試し: 論文をアップロードして、漫画にする（生成AIモック）
              </h2>
              <p style={{ margin: 0, color: '#5a6c87', lineHeight: 1.8 }}>
                ここでは遷移・体験導線だけ実装します。実データ/生成AI連携は次フェーズで接続します。
              </p>

              <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginTop: '1.25rem' }}>
                <div style={{ flex: '1 1 300px', minWidth: 260 }}>
                  <div style={{
                    background: 'rgba(37,51,88,0.06)',
                    borderRadius: '1rem',
                    padding: '1rem 1rem',
                    border: '1px dashed rgba(37,51,88,0.25)'
                  }}>
                    <div style={{ fontWeight: 900, color: '#192841', marginBottom: '0.5rem' }}>
                      論文ファイル（例: PDF）
                    </div>
                    <input
                      type="file"
                      accept=".pdf,.png,.jpg,.jpeg"
                      onChange={(e) => {
                        const f = e.target.files && e.target.files[0];
                        setTryFileName(f ? f.name : '');
                      }}
                      style={{ width: '100%' }}
                    />
                    <div style={{ marginTop: '0.6rem', color: '#5a6c87', fontSize: '0.95rem' }}>
                      選択中: <strong style={{ color: '#192841' }}>{tryFileName || 'なし'}</strong>
                    </div>
                  </div>
                </div>

                <div style={{ flex: '0 0 280px', minWidth: 240 }}>
                  <button
                    onClick={() => {
                      if (!tryFileName) return;
                      setTryStage('generating');
                      setTryResultText('');
                      setTimeout(() => {
                        setTryStage('done');
                        setTryResultText('生成AIモック: 要点を「導入→対比→解法→余韻」に再構成し、3コマの構成案を作成しました。');
                      }, 1500);
                    }}
                    disabled={!tryFileName || tryStage === 'generating'}
                    style={{
                      width: '100%',
                      padding: '1.05rem 1.25rem',
                      fontSize: '1.05rem',
                      fontWeight: 900,
                      color: '#fff',
                      background: tryStage === 'generating' ? 'rgba(63,81,181,0.5)' : 'linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%)',
                      border: 'none',
                      borderRadius: '1rem',
                      cursor: (!tryFileName || tryStage === 'generating') ? 'not-allowed' : 'pointer',
                      boxShadow: '0 8px 30px rgba(63,81,181,0.35)'
                    }}
                  >
                    {tryStage === 'idle' && '生成を開始（モック）'}
                    {tryStage === 'generating' && '生成中…'}
                    {tryStage === 'done' && '生成完了'}
                  </button>
                </div>
              </div>

              {tryStage !== 'idle' && (
                <div style={{
                  marginTop: '1.25rem',
                  background: '#fff',
                  borderRadius: '1rem',
                  padding: '1rem 1rem',
                  border: '1px solid rgba(25,40,65,0.06)'
                }}>
                  <div style={{ fontWeight: 900, color: '#192841', marginBottom: '0.4rem' }}>
                    生成結果
                  </div>
                  <div style={{ color: '#3d4f6b', lineHeight: 1.8 }}>
                    {tryResultText || '—'}
                  </div>
                  <div style={{ marginTop: '0.85rem' }}>
                    <button
                      onClick={() => {
                        setCurrentPage(0);
                        setViewMode('fullscreen');
                      }}
                      style={{
                        padding: '0.75rem 1rem',
                        fontSize: '0.98rem',
                        fontWeight: 900,
                        color: '#253358',
                        background: 'rgba(37,51,88,0.10)',
                        border: '1px solid rgba(37,51,88,0.25)',
                        borderRadius: '0.9rem',
                        cursor: 'pointer'
                      }}
                    >
                      生成結果を漫画として読む（モック） →
                    </button>
                  </div>
                </div>
              )}
            </div>
          </section>

          {/* 登録（モック） */}
          <section style={{
            padding: '2.5rem 2rem',
            maxWidth: '960px',
            margin: '0 auto',
            width: '100%',

          }}>
            <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
              <div style={{
                flex: '1 1 360px',
                minWidth: 280,
                background: 'rgba(255,255,255,0.88)',
                borderRadius: '1.25rem',
                padding: '1.6rem 1.45rem',
                boxShadow: '0 10px 40px rgba(25,40,65,0.08)',
                border: '1px solid rgba(25,40,65,0.06)'
              }}>
                <h3 id="register-viewer" style={{ margin: 0, fontSize: '1.25rem', color: '#253358', fontWeight: 900 }}>

                </h3>
                <p style={{ marginTop: '0.6rem', marginBottom: 0, color: '#5a6c87', lineHeight: 1.8 }}>
                  未ログインでも閲覧できます。機能拡張時に履歴やお気に入りを紐付けます。
                </p>
                <button
                  onClick={() => alert('読者登録（モック）です。次フェーズで API と接続します。')}
                  style={{
                    marginTop: '1rem',
                    width: '100%',
                    padding: '0.95rem 1.1rem',
                    fontSize: '1rem',
                    fontWeight: 900,
                    color: '#fff',
                    background: 'linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%)',
                    border: 'none',
                    borderRadius: '1rem',
                    cursor: 'pointer',
                    boxShadow: '0 8px 30px rgba(63,81,181,0.35)'
                  }}
                >
                  登録する（モック） →
                </button>
              </div>

              <div style={{
                flex: '1 1 360px',
                minWidth: 280,
                background: 'rgba(255,255,255,0.88)',
                borderRadius: '1.25rem',
                padding: '1.6rem 1.45rem',
                boxShadow: '0 10px 40px rgba(25,40,65,0.08)',
                border: '1px solid rgba(25,40,65,0.06)'
              }}>
                <h3 id="register-researcher" style={{ margin: 0, fontSize: '1.25rem', color: '#253358', fontWeight: 900 }}>
                  研究者として登録（本人確認モック）
                </h3>
                <p style={{ marginTop: '0.6rem', marginBottom: 0, color: '#5a6c87', lineHeight: 1.8 }}>
                  学生証/教職員証など研究者の立場を示す証明が必要です（モックUI）。
                </p>
                <div style={{ marginTop: '1rem', background: 'rgba(37,51,88,0.06)', borderRadius: '1rem', padding: '1rem' }}>
                  <div style={{ fontWeight: 900, color: '#192841', marginBottom: '0.5rem' }}>
                    証明書アップロード（モック）
                  </div>
                  <input
                    type="file"
                    accept=".png,.jpg,.jpeg,.pdf"
                    onChange={() => {}}
                    style={{ width: '100%' }}
                  />
                </div>
                <button
                  onClick={() => alert('研究者登録（モック）です。次フェーズで本人確認・API と接続します。')}
                  style={{
                    marginTop: '1rem',
                    width: '100%',
                    padding: '0.95rem 1.1rem',
                    fontSize: '1rem',
                    fontWeight: 900,
                    color: '#fff',
                    background: 'linear-gradient(135deg, #192841 0%, #253358 50%, #3f51b5 100%)',
                    border: 'none',
                    borderRadius: '1rem',
                    cursor: 'pointer',
                    boxShadow: '0 8px 30px rgba(25,40,65,0.35)'
                  }}
                >
                  登録する（モック） →
                </button>
              </div>
            </div>

            <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginTop: '1rem' }}>
              <div style={{
                flex: '1 1 360px',
                minWidth: 280,
                background: 'rgba(255,255,255,0.88)',
                borderRadius: '1.25rem',
                padding: '1.6rem 1.45rem',
                boxShadow: '0 10px 40px rgba(25,40,65,0.08)',
                border: '1px solid rgba(25,40,65,0.06)'
              }}>
                <h3 id="contact" style={{ margin: 0, fontSize: '1.25rem', color: '#253358', fontWeight: 900 }}>
                  お問い合わせ
                </h3>
                <p style={{ marginTop: '0.6rem', marginBottom: 0, color: '#5a6c87', lineHeight: 1.8 }}>
                  困ったときはメールで連絡してください（モック）。
                </p>
                <a
                  href="mailto:hello@quantumy.example"
                  style={{
                    display: 'inline-block',
                    marginTop: '1rem',
                    width: '100%',
                    padding: '0.95rem 1.1rem',
                    fontSize: '1rem',
                    fontWeight: 900,
                    color: '#fff',
                    background: 'linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%)',
                    borderRadius: '1rem',
                    textDecoration: 'none',
                    boxShadow: '0 8px 30px rgba(63,81,181,0.35)'
                  }}
                >
                  メールを送る →
                </a>
              </div>

              <div style={{
                flex: '1 1 360px',
                minWidth: 280,
                background: 'rgba(255,255,255,0.88)',
                borderRadius: '1.25rem',
                padding: '1.6rem 1.45rem',
                boxShadow: '0 10px 40px rgba(25,40,65,0.08)',
                border: '1px solid rgba(25,40,65,0.06)'
              }}>
                <h3 id="terms" style={{ margin: 0, fontSize: '1.25rem', color: '#253358', fontWeight: 900 }}>
                  利用規約（モック）
                </h3>
                <p style={{ marginTop: '0.6rem', marginBottom: 0, color: '#5a6c87', lineHeight: 1.8 }}>
                  本サービスは研究者の投稿と、漫画読者の閲覧を扱います。利用条件・免責・権利関係は今後整備します。
                </p>
                <button
                  onClick={() => alert('利用規約（モック）です。実テキストは次フェーズで整備します。')}
                  style={{
                    marginTop: '1rem',
                    width: '100%',
