      function MangaReaderView({ workId, onBackToWorks, onAuthorClick, mergedWorks }) {
        const list = mergedWorks || works;
        const baseWork = list.find((w) => w.id === workId);
        const [fetchedWork, setFetchedWork] = useState(null);

        useEffect(() => {
          let alive = true;
          const fromList = list.find((w) => w.id === workId);
          if (fromList && Array.isArray(fromList.pages) && fromList.pages.length > 0) {
            setFetchedWork(null);
            return () => { alive = false; };
          }
          fetchCatalogArtworkDetail(workId).then((w) => {
            if (!alive) return;
            setFetchedWork(w);
          });
          return () => { alive = false; };
        }, [workId, list]);

        const work = fetchedWork || baseWork || works[0];
        const pages = work.pages && work.pages.length > 0 ? work.pages : mangaPages;
        const pageCount = pages.length;
        const pairCount = Math.ceil(Math.max(pageCount - 1, 0) / 2);
        const maxSpreadIndex = 1 + pairCount - 1;

        const [spreadIndex, setSpreadIndex] = useState(0);
        const spread = useMemo(() => getSpreadForIndex(pageCount, spreadIndex), [pageCount, spreadIndex]);
        const prevPage = spreadIndex === 0 ? null : (spread.left !== null ? pages[spread.left] : null);
        const nextPage = spreadIndex === 0 ? (pages[0] || null) : (spread.right !== null ? pages[spread.right] : null);

        // (1) Header auto-hide
        const AUTO_HIDE_MS = 2500;
        const [headerHidden, setHeaderHidden] = useState(false);
        const hideTimerRef = useRef(null);

        const armAutoHide = () => {
          setHeaderHidden(false);
          if (hideTimerRef.current) clearTimeout(hideTimerRef.current);
          hideTimerRef.current = setTimeout(() => setHeaderHidden(true), AUTO_HIDE_MS);
        };

        useEffect(() => {
          let alive = true;
          (async () => {
            const saved = await loadLastSpreadIndex(workId);
            if (!alive) return;
            setSpreadIndex(clamp(saved, 0, maxSpreadIndex));
            setHeaderHidden(false);
            if (hideTimerRef.current) clearTimeout(hideTimerRef.current);
            armAutoHide();
          })();
          return () => {
            alive = false;
          };
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [workId, maxSpreadIndex]);

        // (3) Continue-from: save on each navigation
        useEffect(() => {
          saveLastSpreadIndex(workId, spreadIndex);
        }, [workId, spreadIndex]);

        // (4) 作品ドロワー（上スライドで出す：あらすじ・共有・コメント）
        const DRAWER_H = 400;
        const [drawerOpen, setDrawerOpen] = useState(false);

        // お気に入り状態
        const [favorited, setFavorited] = useState(false);
        const [favLoading, setFavLoading] = useState(false);
        useEffect(() => {
          let alive = true;
          fetchFavoriteStatus(work.id).then((v) => { if (alive) setFavorited(v); });
          return () => { alive = false; };
        }, [work.id]);

        const onToggleFavorite = async () => {
          if (favLoading) return;
          setFavLoading(true);
          const result = await toggleFavoriteApi(work.id);
          if (result !== null) setFavorited(result);
          setFavLoading(false);
        };

        // コメント状態
        const [comments, setComments] = useState([]);
        const [commentsLoaded, setCommentsLoaded] = useState(false);
        const [commentBody, setCommentBody] = useState("");
        const [commentPosting, setCommentPosting] = useState(false);
        const [commentError, setCommentError] = useState("");

        useEffect(() => {
          setCommentsLoaded(false);
        }, [workId]);

        useEffect(() => {
          if (!drawerOpen || commentsLoaded) return;
          fetchComments(work.id).then((c) => { setComments(c); setCommentsLoaded(true); });
        }, [drawerOpen, commentsLoaded, work.id]);

        const onPostComment = async () => {
          const trimmed = commentBody.trim();
          if (!trimmed) return;
          setCommentPosting(true);
          setCommentError("");
          const result = await postComment(work.id, trimmed);
          if (result.ok) {
            setCommentBody("");
            const fresh = await fetchComments(work.id);
            setComments(fresh);
          } else {
            setCommentError(result.error || "投稿に失敗しました。");
          }
          setCommentPosting(false);
        };

        // (2) Drag / swipe for spread navigation
        const dragRef = useRef({ startX: 0, startY: 0, startT: 0, armed: false });

        const goPrev = () => setSpreadIndex((s) => Math.max(0, s - 1));
        const goNext = () => setSpreadIndex((s) => Math.min(maxSpreadIndex, s + 1));

        const onSurfacePointerDown = (e) => {
          if (e.pointerType === "mouse" && e.button !== 0) return;
          dragRef.current = { startX: e.clientX, startY: e.clientY, startT: Date.now(), armed: true };
          armAutoHide();
        };

        const onSurfacePointerUp = (e) => {
          if (!dragRef.current.armed) return;
          dragRef.current.armed = false;

          const dx = e.clientX - dragRef.current.startX;
          const dy = e.clientY - dragRef.current.startY;
          const absDx = Math.abs(dx);
          const absDy = Math.abs(dy);
          const elapsed = Date.now() - dragRef.current.startT;

          const SWIPE_MIN_X = 45;
          const SWIPE_MAX_Y = 80;
          const SWIPE_MAX_TIME_MS = 650;

          // 縦スワイプ: 上でドロワーOPEN / 下でCLOSE
          const SWIPE_MIN_Y = 70;
          const SWIPE_MAX_X_FOR_VERTICAL = 60;
          const isVerticalSwipe =
            absDy >= SWIPE_MIN_Y && absDx <= SWIPE_MAX_X_FOR_VERTICAL && elapsed <= SWIPE_MAX_TIME_MS;
          if (isVerticalSwipe) {
            if (dy < 0) setDrawerOpen(true);
            else setDrawerOpen(false);
            return;
          }

          // ドロワー表示中は、水平スワイプでページ送りしない
          if (drawerOpen) return;

          // 横スワイプ: スプレッド送り
          const isSwipe = absDx >= SWIPE_MIN_X && absDy <= SWIPE_MAX_Y && elapsed <= SWIPE_MAX_TIME_MS;
          if (!isSwipe) return;

          if (dx < 0) goNext();
          else goPrev();
        };

        const headerStyle = {
          height: 60,
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          padding: "0 1rem",
          background: "rgba(0,0,0,0.45)",
          borderBottom: "1px solid rgba(255,255,255,0.08)",
          opacity: headerHidden ? 0 : 1,
          transform: headerHidden ? "translateY(-12px)" : "translateY(0px)",
          transition: "opacity 180ms ease, transform 180ms ease",
          pointerEvents: headerHidden ? "none" : "auto",
        };

        const onHeaderNav = (fn) => {
          armAutoHide();
          fn();
        };

        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 9999, background: "#0f1419", color: "#e8ecf4", fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif' }}>
            <header style={headerStyle}>
              <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                <button onClick={() => onHeaderNav(onBackToWorks)} style={{ padding: "0.55rem 0.85rem", borderRadius: "0.9rem", background: "rgba(255,255,255,0.08)", color: "#e8ecf4", border: "1px solid rgba(255,255,255,0.18)", cursor: "pointer", fontWeight: 1000 }}>
                  ← 一覧へ
                </button>
                <div style={{ fontWeight: 1000, letterSpacing: "0.01em", whiteSpace: "nowrap" }}>{work.title}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                <button
                  onClick={onToggleFavorite}
                  disabled={favLoading}
                  title={favorited ? "お気に入り解除" : "お気に入り追加"}
                  style={{ padding: "0.45rem 0.7rem", borderRadius: "0.85rem", background: favorited ? "rgba(250,204,21,0.18)" : "rgba(255,255,255,0.08)", color: favorited ? "#facc15" : "rgba(255,255,255,0.7)", border: `1px solid ${favorited ? "rgba(250,204,21,0.4)" : "rgba(255,255,255,0.18)"}`, cursor: favLoading ? "not-allowed" : "pointer", fontWeight: 900, fontSize: "1rem", lineHeight: 1 }}
                >
                  {favorited ? "★" : "☆"}
                </button>
                <div style={{ color: "rgba(255,255,255,0.7)", fontWeight: 900, fontSize: "0.9rem" }}>
                  {prevPage ? prevPage.pageNumber : "—"}
                  {nextPage ? `・${nextPage.pageNumber}` : ""} / {pageCount}P
                </div>
              </div>
            </header>

            <main style={{ height: "calc(100% - 60px)", display: "flex", flexDirection: "column" }}>
              <div style={{ flex: 1, overflow: "hidden" }}>
                <div
                  className="readerTouchSurface"
                  style={{ position: "relative", height: "100%", padding: "0.75rem", display: "flex", alignItems: "center", justifyContent: "center", gap: "0.6rem" }}
                  onPointerDown={onSurfacePointerDown}
                  onPointerUp={onSurfacePointerUp}
                  onPointerCancel={() => {
                    dragRef.current.armed = false;
                  }}
                >
                  {/* 左＝次ページ */}
                  <div style={{ flex: "0 0 50%", maxWidth: 520, display: "flex", justifyContent: "flex-start" }}>
                    {nextPage && (
                      <img
                        src={nextPage.imageUrl}
                        alt={`Page ${nextPage.pageNumber}`}
                        style={{ width: "100%", height: "auto", maxHeight: "calc(100vh - 130px)", objectFit: "contain", borderRadius: "6px", boxShadow: "0 10px 40px rgba(0,0,0,0.35)" }}
                      />
                    )}
                  </div>
                  {/* 右＝前ページ */}
                  <div style={{ flex: "0 0 50%", maxWidth: 520, display: "flex", justifyContent: "flex-start", visibility: prevPage ? "visible" : "hidden" }}>
                    {prevPage && (
                      <img
                        src={prevPage.imageUrl}
                        alt={`Page ${prevPage.pageNumber}`}
                        style={{ width: "100%", height: "auto", maxHeight: "calc(100vh - 130px)", objectFit: "contain", borderRadius: "6px", boxShadow: "0 10px 40px rgba(0,0,0,0.35)" }}
                      />
                    )}
                  </div>

                  {/* コマ割り風の暫定“割れ”演出（文字は出さない） */}
                  <div
                    style={{
                      position: "absolute",
                      left: "50%",
                      top: 0,
                      bottom: 0,
                      width: 3,
                      background: "linear-gradient(180deg, rgba(34,197,94,0.0), rgba(34,197,94,0.6), rgba(34,197,94,0.0))",
                      transform: "translateX(-1.5px)",
                      opacity: 0.85,
                      pointerEvents: "none",
                    }}
                  />
                </div>
              </div>

              {!drawerOpen && (
                <div
                  style={{
                    height: 68,
                    padding: "0.65rem 1rem 0.9rem",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    background: "rgba(0,0,0,0.15)",
                    borderTop: "1px solid rgba(255,255,255,0.08)",
                  }}
                >
                  {/* 指定: 次を左 / 前を右 */}
                  <button
                    onClick={() => onHeaderNav(goNext)}
                    disabled={spreadIndex >= maxSpreadIndex}
                    style={{ padding: "0.7rem 1rem", borderRadius: "0.95rem", background: spreadIndex >= maxSpreadIndex ? "rgba(255,255,255,0.06)" : "rgba(34,197,94,0.22)", color: "#eaf8ef", border: "1px solid rgba(34,197,94,0.35)", cursor: spreadIndex >= maxSpreadIndex ? "not-allowed" : "pointer", fontWeight: 1100 }}
                  >
                    次（スプレッド） ▶
                  </button>
                  <div style={{ color: "rgba(255,255,255,0.7)", fontWeight: 900, textAlign: "center" }}>
                    {spreadIndex + 1} / {maxSpreadIndex + 1}
                  </div>
                  <button
                    onClick={() => onHeaderNav(goPrev)}
                    disabled={spreadIndex === 0}
                    style={{ padding: "0.7rem 1rem", borderRadius: "0.95rem", background: spreadIndex === 0 ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.10)", color: "#e8ecf4", border: "1px solid rgba(255,255,255,0.18)", cursor: spreadIndex === 0 ? "not-allowed" : "pointer", fontWeight: 1100 }}
                  >
                    ◀ 前（スプレッド）
                  </button>
                </div>
              )}
            </main>

            {/* コメント/あらすじドロワー */}
            <div
              style={{
                position: "fixed",
                left: 0,
                right: 0,
                bottom: 0,
                zIndex: 10000,
                height: DRAWER_H,
                background: "rgba(6,17,11,0.96)",
                borderTop: "1px solid rgba(255,255,255,0.08)",
                backdropFilter: "blur(14px)",
                transform: drawerOpen ? "translateY(0px)" : "translateY(" + DRAWER_H + "px)",
                transition: "transform 220ms ease",
                overflow: "hidden",
                pointerEvents: drawerOpen ? "auto" : "none",
              }}
            >
              <div
                style={{
                  height: 44,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  padding: "0 1rem",
                  borderBottom: "1px solid rgba(255,255,255,0.06)",
                }}
              >
                <div style={{ width: 60, height: 6, borderRadius: 999, background: "rgba(234,248,239,0.25)" }} />
                <button
                  onClick={() => setDrawerOpen(false)}
                  style={{ padding: "0.4rem 0.75rem", borderRadius: 10, background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", color: "#eaf8ef", cursor: "pointer", fontWeight: 900 }}
                >
                  閉じる
                </button>
              </div>
              <div style={{ padding: "0.95rem 1rem 1rem", overflow: "auto", height: "calc(" + DRAWER_H + "px - 44px)" }}>
                <div style={{ color: "#eaf8ef", fontWeight: 1000, fontSize: "1.05rem", marginBottom: "0.55rem" }}>あらすじ</div>
                <div style={{ color: "rgba(234,248,239,0.78)", lineHeight: 1.85, marginBottom: "1rem" }}>
                  {work.description}
                </div>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "0.75rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                  <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
                    <a
                      href={"https://twitter.com/intent/tweet?text=" + encodeURIComponent(work.title)}
                      target="_blank"
                      rel="noopener noreferrer"
                      style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 40, height: 40, borderRadius: 12, background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", color: "#eaf8ef", textDecoration: "none", fontWeight: 1100 }}
                      aria-label="Xで共有"
                      title="Xで共有"
                    >
                      X
                    </a>
                    <a
                      href={"https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href)}
                      target="_blank"
                      rel="noopener noreferrer"
                      style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 40, height: 40, borderRadius: 12, background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", color: "#eaf8ef", textDecoration: "none", fontWeight: 1100 }}
                      aria-label="Facebookで共有"
                      title="Facebookで共有"
                    >
                      f
                    </a>
                  </div>
                  <div style={{ color: "rgba(234,248,239,0.65)", fontWeight: 900, fontSize: "0.95rem" }}>💬 コメント ({comments.length})</div>
                </div>

                {/* コメント投稿フォーム */}
                {getAccessToken() ? (
                  <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.85rem" }}>
                    <input
                      type="text"
                      value={commentBody}
                      onChange={(e) => setCommentBody(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onPostComment(); } }}
                      placeholder="コメントを入力…（Enterで送信）"
                      maxLength={500}
                      style={{ flex: 1, padding: "0.6rem 0.75rem", borderRadius: "0.75rem", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.18)", color: "#eaf8ef", fontSize: "0.9rem", outline: "none" }}
                    />
                    <button
                      onClick={onPostComment}
                      disabled={commentPosting || !commentBody.trim()}
                      style={{ padding: "0.6rem 0.9rem", borderRadius: "0.75rem", background: commentBody.trim() ? "rgba(34,197,94,0.9)" : "rgba(255,255,255,0.06)", color: commentBody.trim() ? "#06210f" : "rgba(255,255,255,0.3)", border: "none", cursor: commentBody.trim() ? "pointer" : "not-allowed", fontWeight: 900, whiteSpace: "nowrap" }}
                    >
                      {commentPosting ? "…" : "送信"}
                    </button>
                  </div>
                ) : (
                  <div style={{ fontSize: "0.85rem", color: "rgba(234,248,239,0.45)", marginBottom: "0.75rem" }}>コメントするにはログインが必要です</div>
                )}
                {commentError && <div style={{ fontSize: "0.82rem", color: "#f87171", marginBottom: "0.5rem" }}>{commentError}</div>}

                {/* コメント一覧 */}
                <div style={{ display: "flex", flexDirection: "column", gap: "0.65rem" }}>
                  {!commentsLoaded ? (
                    <div style={{ color: "rgba(234,248,239,0.3)", fontSize: "0.85rem" }}>読み込み中…</div>
                  ) : comments.length === 0 ? (
                    <div style={{ color: "rgba(234,248,239,0.35)", fontSize: "0.85rem" }}>まだコメントがありません。最初のコメントを書いてみましょう！</div>
                  ) : (
                    comments.map((c) => (
                      <div key={c.id} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.10)", borderRadius: 12, padding: "0.7rem 0.85rem" }}>
                        <div style={{ color: "rgba(234,248,239,0.75)", fontWeight: 1000, fontSize: "0.85rem", marginBottom: "0.2rem" }}>{c.display_name}</div>
                        <div style={{ color: "rgba(234,248,239,0.72)", lineHeight: 1.65, fontSize: "0.92rem" }}>{c.body}</div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      /** 直リンク・ブックマーク用: #auth / #works / #manga/... を初回から反映（未対応だと # が #home に上書きされ auth が見えない） */
      function parseInitialRouteFromHash() {
        const h = (typeof window !== "undefined" ? window.location.hash : "").replace(/^#/, "");
        if (h.startsWith("manga/")) {
          const wid = decodeURIComponent(h.slice("manga/".length));
          return { route: "manga", workId: wid || works[0].id };
        }
        if (h === "works" || h === "auth" || h === "author" || h === "home" || h === "dashboard" || h === "studio") {
          return { route: h, workId: works[0].id };
        }
        return { route: "home", workId: works[0].id };
      }

      // ─── 共通スタイル定数 ───────────────────────────────────────────────────
      const PAGE_BG = { minHeight: "100vh", background: "linear-gradient(180deg, #06110b 0%, #0b1a12 45%, #06110b 100%)", color: "#eaf8ef", fontFamily: 'Inter, "Helvetica Neue", Arial, sans-serif' };
      const CARD = { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(34,197,94,0.2)", borderRadius: "1rem", padding: "1rem 1.1rem" };
      const TONE_LIST = [
        { key: "少年マンガ", emoji: "🔥", label: "少年" },
        { key: "SF",         emoji: "🚀", label: "SF" },
        { key: "社会派",     emoji: "📰", label: "社会派" },
        { key: "ホラー",     emoji: "👻", label: "ホラー" },
        { key: "恋愛",       emoji: "💕", label: "恋愛" },
      ];

      // ─── チャット修正パネル（SynopsisView / NamePlanView で共用） ──────────
      function ChatRefinePanel({ currentData, onRefined, disabled }) {
        const [instruction, setInstruction] = useState("");
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState("");

        const send = async () => {
          const txt = instruction.trim();
          if (!txt || busy) return;
          setBusy(true); setError("");
          try {
            const res = await fetch(apiUrl("/api/ai/refine"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                tone: currentData.tone,
                instruction: txt,
                theme_line: currentData.theme_line,
                characters: currentData.characters || [],
                synopsis: currentData.synopsis,
                panel_beats: currentData.panel_beats || [],
              }),
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.message || "修正に失敗しました");
            onRefined(data);
            setInstruction("");
          } catch (e) {
            setError(e.message || "エラーが発生しました");
          } finally {
            setBusy(false);
          }
        };

        return (
          <div style={{ marginTop: "1.5rem", borderTop: "1px solid rgba(34,197,94,0.2)", paddingTop: "1rem" }}>
            <div style={{ fontSize: "0.8rem", fontWeight: 900, color: "rgba(167,243,208,0.8)", marginBottom: "0.5rem", letterSpacing: "0.06em" }}>
              💬 博士の修正指示（例: もっと熱くして / 登場人物を3人に / 転をどんでん返しにして）
            </div>
            <div style={{ display: "flex", gap: "0.5rem" }}>
              <input
                value={instruction}
                onChange={e => setInstruction(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()}
                placeholder="修正指示を入力して Enter…"
                disabled={disabled || busy}
                style={{
                  flex: 1, padding: "0.65rem 0.9rem", fontSize: "0.95rem",
                  background: "rgba(255,255,255,0.07)", border: "1.5px solid rgba(34,197,94,0.35)",
                  borderRadius: "0.75rem", color: "#eaf8ef", outline: "none",
                  opacity: (disabled || busy) ? 0.5 : 1,
                }}
              />
              <button
                onClick={send}
                disabled={!instruction.trim() || disabled || busy}
                style={{
                  padding: "0.65rem 1.1rem", fontWeight: 900, fontSize: "0.9rem",
                  background: (!instruction.trim() || disabled || busy) ? "rgba(34,197,94,0.3)" : "linear-gradient(135deg,#22c55e,#16a34a)",
                  color: "#06210f", border: "none", borderRadius: "0.75rem", cursor: (!instruction.trim() || disabled || busy) ? "not-allowed" : "pointer",
                  minWidth: 64,
                }}
              >
                {busy ? "…" : "送信"}
              </button>
            </div>
            {error && <div style={{ marginTop: "0.5rem", color: "#fca5a5", fontSize: "0.85rem" }}>{error}</div>}
          </div>
        );
      }

      // ─── ToneSelector 共用コンポーネント ────────────────────────────────────
      function ToneSelector({ value, onChange }) {
        return (
          <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
            {TONE_LIST.map(({ key, emoji, label }) => (
              <button key={key} type="button" onClick={() => onChange(key)} style={{
                padding: "0.35rem 0.8rem", borderRadius: "99px",
                border: value === key ? "1.5px solid #22c55e" : "1.5px solid rgba(34,197,94,0.3)",
                background: value === key ? "rgba(34,197,94,0.28)" : "rgba(34,197,94,0.07)",
                color: value === key ? "#86efac" : "rgba(234,248,239,0.65)",
                fontWeight: value === key ? 900 : 700, fontSize: "0.85rem", cursor: "pointer", transition: "all 0.15s",
              }}>
                {emoji} {label}
              </button>
            ))}
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      //  NameSheetView — ネーム生成ページ（コマ割り・セリフ・演出）
      // ─────────────────────────────────────────────────────────────────────
      const LAYOUT_STYLE = {
        "大ゴマ":  { flex: "2 1 100%", minHeight: 120 },
        "横長":   { flex: "2 1 100%", minHeight: 80 },
        "縦長":   { flex: "1 1 45%",  minHeight: 130 },
        "正方形": { flex: "1 1 45%",  minHeight: 100 },
        "小":     { flex: "1 1 30%",  minHeight: 70 },
      };
      const BEAT_COLOR = {
        "起": { bg: "rgba(59,130,246,0.15)", border: "rgba(59,130,246,0.5)",  accent: "#93c5fd" },
        "承": { bg: "rgba(234,179,8,0.15)",  border: "rgba(234,179,8,0.5)",   accent: "#fde68a" },
        "転": { bg: "rgba(34,197,94,0.15)",  border: "rgba(34,197,94,0.5)",   accent: "#86efac" },
        "結": { bg: "rgba(168,85,247,0.15)", border: "rgba(168,85,247,0.5)",  accent: "#c4b5fd" },
      };

      function NameSheetView({ initialData, onBack }) {
        const [pages, setPages] = useState(null);
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState("");
        const [source, setSource] = useState("");
        const data = initialData || {};

        const generate = async () => {
          setBusy(true); setError(""); setPages(null);
          try {
            const res = await fetch(apiUrl("/api/ai/namesheet"), {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                tone: data.tone,
                theme_line: data.theme_line,
                characters: data.characters || [],
                synopsis: data.synopsis,
                panel_beats: data.panel_beats || [],
              }),
            });
            const d = await res.json();
            if (!d.ok) throw new Error(d.message || "生成に失敗しました");
            setPages(d.pages);
            setSource(d.source);
          } catch (e) {
            setError(e.message || "エラーが発生しました");
          } finally { setBusy(false); }
        };

        const regenPage = async (idx) => {
          if (!pages) return;
          const beat = pages[idx];
          setBusy(true); setError("");
          try {
            const res = await fetch(apiUrl("/api/ai/namesheet"), {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                tone: data.tone,
                theme_line: data.theme_line,
                characters: data.characters || [],
                synopsis: data.synopsis,
                panel_beats: data.panel_beats || [],
              }),
            });
            const d = await res.json();
            if (!d.ok) throw new Error(d.message || "再生成に失敗しました");
            if (d.pages?.[idx]) {
              setPages(prev => { const next = [...prev]; next[idx] = d.pages[idx]; return next; });
            }
          } catch (e) { setError(e.message); }
          finally { setBusy(false); }
        };

        // 自動生成：マウント時にデータがあれば即生成
        useEffect(() => { if (data.panel_beats?.length) generate(); }, []);

        return (
          <div style={{ ...PAGE_BG, padding: "0 0 4rem 0" }}>
            {/* ヘッダー */}
            <div style={{ display: "flex", alignItems: "center", gap: "1rem", padding: "1.2rem 1.5rem", borderBottom: "1px solid rgba(34,197,94,0.15)" }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "rgba(167,243,208,0.8)", cursor: "pointer", fontSize: "1.1rem" }}>← 戻る</button>
              <span style={{ fontWeight: 900, fontSize: "1.1rem", letterSpacing: "0.04em" }}>📋 ネーム生成（コマ割り）</span>
              {source && (
                <span style={{ marginLeft: "auto", fontSize: "0.73rem", fontWeight: 700, padding: "0.18rem 0.5rem", borderRadius: "99px", background: source === "gemini" ? "rgba(234,179,8,0.2)" : "rgba(255,255,255,0.1)", color: source === "gemini" ? "#fde68a" : "rgba(234,248,239,0.5)", border: "1px solid rgba(34,197,94,0.25)" }}>
                  {source === "gemini" ? "✦ Gemini" : "⚙ mock"}
                </span>
              )}
            </div>

            <div style={{ maxWidth: 900, margin: "0 auto", padding: "1.5rem" }}>
              {/* テーマ表示 */}
              {data.theme_line && (
                <div style={{ marginBottom: "1rem", padding: "0.65rem 1rem", background: "linear-gradient(135deg,rgba(34,197,94,0.15),rgba(16,163,74,0.08))", border: "1.5px solid rgba(34,197,94,0.4)", borderRadius: "0.85rem" }}>
                  <span style={{ fontSize: "0.68rem", fontWeight: 900, color: "rgba(167,243,208,0.65)", letterSpacing: "0.06em" }}>テーマ </span>
                  <span style={{ fontSize: "1rem", fontWeight: 1000, color: "#eaf8ef" }}>{data.theme_line}</span>
                  {data.tone && <span style={{ marginLeft: 8, fontSize: "0.72rem", color: "rgba(167,243,208,0.5)" }}>({data.tone})</span>}
                </div>
              )}

              {/* ローディング */}
              {busy && (
                <div style={{ textAlign: "center", padding: "3rem 1rem" }}>
                  <div style={{ fontSize: "2rem", marginBottom: "0.8rem" }}>🎨</div>
                  <div style={{ fontSize: "1rem", color: "rgba(167,243,208,0.8)", fontWeight: 900 }}>Gemini がネームを生成中…</div>
                  <div style={{ fontSize: "0.82rem", color: "rgba(167,243,208,0.5)", marginTop: "0.4rem" }}>起承転結 4 ページ × 3〜5 コマを生成しています（30〜60 秒）</div>
                  <div style={{ marginTop: "1.2rem", width: 200, height: 4, borderRadius: 4, background: "rgba(255,255,255,0.1)", overflow: "hidden", margin: "1.2rem auto 0" }}>
                    <div style={{ height: "100%", borderRadius: 4, width: "60%", background: "linear-gradient(90deg,#22c55e,#16a34a)", animation: "pulse 1.5s ease-in-out infinite" }} />
                  </div>
                </div>
              )}

              {/* エラー */}
              {error && (
                <div style={{ marginBottom: "1rem", padding: "0.75rem 1rem", background: "rgba(127,29,29,0.3)", border: "1px solid rgba(252,165,165,0.4)", borderRadius: "0.75rem", color: "#fca5a5", fontSize: "0.9rem" }}>
                  {error}
                  <button onClick={generate} style={{ marginLeft: "1rem", padding: "0.3rem 0.8rem", fontSize: "0.82rem", fontWeight: 700, background: "rgba(34,197,94,0.25)", border: "1px solid rgba(34,197,94,0.4)", borderRadius: "0.5rem", color: "#86efac", cursor: "pointer" }}>再試行</button>
                </div>
              )}

              {/* ネームページ表示 */}
              {pages && pages.map((page, pi) => {
                const bc = BEAT_COLOR[page.beat] || BEAT_COLOR["起"];
                return (
                  <div key={pi} style={{ marginBottom: "1.5rem", background: bc.bg, border: `1.5px solid ${bc.border}`, borderRadius: "1rem", overflow: "hidden" }}>
                    {/* ページヘッダー */}
                    <div style={{ display: "flex", alignItems: "center", gap: "0.7rem", padding: "0.7rem 1rem", borderBottom: `1px solid ${bc.border}` }}>
                      <span style={{ fontWeight: 1000, fontSize: "1.5rem", color: bc.accent, minWidth: 28 }}>{page.beat}</span>
                      <span style={{ fontSize: "0.82rem", color: "rgba(234,248,239,0.7)", flex: 1 }}>{page.scene_direction}</span>
                      <button
                        onClick={() => regenPage(pi)}
                        disabled={busy}
                        style={{ padding: "0.25rem 0.65rem", fontSize: "0.75rem", fontWeight: 700, background: "rgba(34,197,94,0.2)", border: "none", borderRadius: "0.4rem", color: "#86efac", cursor: busy ? "wait" : "pointer", opacity: busy ? 0.5 : 1 }}
                      >
                        ⟳ このページを再生成
                      </button>
                    </div>

                    {/* コマ一覧 */}
                    <div style={{ display: "flex", flexWrap: "wrap", gap: "0.6rem", padding: "0.8rem" }}>
                      {page.panels?.map((panel, ci) => {
                        const ls = LAYOUT_STYLE[panel.layout] || LAYOUT_STYLE["正方形"];
                        return (
                          <div key={ci} style={{
                            ...ls,
                            background: "rgba(0,0,0,0.35)", border: `1px solid ${bc.border}`, borderRadius: "0.65rem",
                            padding: "0.7rem 0.8rem", display: "flex", flexDirection: "column", gap: "0.35rem", position: "relative",
                          }}>
                            {/* コマ番号・レイアウト */}
                            <div style={{ display: "flex", gap: "0.4rem", alignItems: "center", marginBottom: "0.1rem" }}>
                              <span style={{ fontSize: "0.62rem", fontWeight: 900, color: bc.accent, background: "rgba(0,0,0,0.4)", padding: "0.1rem 0.35rem", borderRadius: "0.3rem" }}>
                                コマ {panel.number}
                              </span>
                              <span style={{ fontSize: "0.6rem", color: "rgba(234,248,239,0.4)" }}>{panel.layout}</span>
                            </div>

                            {/* 場面説明 */}
                            <div style={{ fontSize: "0.82rem", color: "#eaf8ef", fontWeight: 700, lineHeight: 1.5 }}>{panel.scene}</div>

                            {/* セリフ */}
                            {panel.dialogue && (
                              <div style={{ marginTop: "0.25rem", padding: "0.35rem 0.5rem", background: "rgba(255,255,255,0.1)", borderLeft: `3px solid ${bc.accent}`, borderRadius: "0 0.4rem 0.4rem 0", fontSize: "0.82rem", color: bc.accent, fontStyle: "italic", lineHeight: 1.5 }}>
                                「{panel.dialogue}」
                              </div>
                            )}

                            {/* 演出 */}
                            {panel.direction && (
                              <div style={{ marginTop: "auto", fontSize: "0.72rem", color: "rgba(234,248,239,0.5)", lineHeight: 1.4 }}>
                                📐 {panel.direction}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* 全体再生成ボタン */}
              {(pages || error) && !busy && (
                <button
                  onClick={generate}
                  style={{ width: "100%", padding: "0.85rem", fontSize: "0.95rem", fontWeight: 900, background: "rgba(34,197,94,0.2)", border: "1.5px solid rgba(34,197,94,0.4)", borderRadius: "0.85rem", color: "#86efac", cursor: "pointer", marginTop: "0.5rem" }}
                >
                  ⟳ ネーム全体を再生成する
                </button>
              )}
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      //  SynopsisView — 粗筋生成ページ
      // ─────────────────────────────────────────────────────────────────────
      function SynopsisView({ onBack, onGoNamePlan }) {
        const [tone, setTone] = useState("少年マンガ");
        const [pastedText, setPastedText] = useState("");
        const [fileName, setFileName] = useState("");
        const [pdfBusy, setPdfBusy] = useState(false);
        const [pdfInfo, setPdfInfo] = useState("");
        const [stage, setStage] = useState("idle"); // idle | generating | done
        const [pipeJobId, setPipeJobId] = useState(null);
        const [pipeStage, setPipeStage] = useState(null);
        const [result, setResult] = useState(null);
        const [error, setError] = useState("");
        const fileRef = useRef(null);

        // ポーリング
        useEffect(() => {
          if (!pipeJobId || stage !== "generating") return;
          const timer = setInterval(async () => {
            try {
              const res = await fetch(apiUrl(`/api/ai/jobs/${pipeJobId}`));
              if (!res.ok) return;
              const data = await res.json();
              if (data.current_stage) setPipeStage(data.current_stage);
              if (data.status === "completed") {
                clearInterval(timer);
                const s = data.story_json || {};
                setResult({ tone, theme_line: s.theme_line, characters: s.characters || [], synopsis: s.synopsis, panel_beats: s.panel_beats || [], source: s.source });
                setStage("done");
              } else if (data.status === "failed") {
                clearInterval(timer);
                setError(data.error_message || "生成に失敗しました");
                setStage("idle");
              }
            } catch {}
          }, 2000);
          return () => clearInterval(timer);
        }, [pipeJobId, stage]);

        const generate = async () => {
          const text = pastedText.trim();
          if (!text) return;
          setStage("generating"); setError(""); setResult(null); setPipeJobId(null); setPipeStage(null);
          try {
            const res = await fetch(apiUrl("/api/ai/ingest"), {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text, title: fileName || null, manga_tone: tone }),
            });
            const data = await res.json();
            if (!res.ok || !data.ok) throw new Error(data?.message || `HTTP ${res.status}`);
            setPipeJobId(data.job_id);
          } catch (e) {
            setError(e.message || "APIエラー"); setStage("idle");
          }
        };

        const handlePdf = async (file) => {
          if (!file) return;
          setFileName(file.name); setPdfBusy(true); setPdfInfo("PDF 解析中…"); setPastedText("");
          try {
            if (typeof pdfjsLib !== "undefined") {
              pdfjsLib.GlobalWorkerOptions.workerSrc = "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
              const ab = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(ab) }).promise;
              let text = "";
              for (let i = 1; i <= pdf.numPages; i++) {
                const pg = await pdf.getPage(i);
                const tc = await pg.getTextContent();
                text += tc.items.map(it => it.str).join(" ") + "\n";
              }
              const trimmed = text.replace(/\s+/g, " ").trim();
              const limit = 100000;
              const truncated = trimmed.length > limit;
              setPastedText(truncated ? trimmed.slice(0, limit) : trimmed);
              setPdfInfo(`先頭 ${truncated ? "100,000 文字まで" : trimmed.length + " 文字"}（${pdf.numPages}ページ）を取り込みました。`);
            } else {
              setPdfInfo("PDF.js 未ロード"); }
          } catch (e) { setPdfInfo("PDF 読み取りエラー: " + e.message); }
          finally { setPdfBusy(false); }
        };

        const onRefined = (data) => {
          setResult(prev => ({ ...prev, tone: prev?.tone, theme_line: data.theme_line ?? prev?.theme_line, characters: data.characters?.length ? data.characters : (prev?.characters || []), synopsis: data.synopsis ?? prev?.synopsis, panel_beats: data.panel_beats?.length ? data.panel_beats : (prev?.panel_beats || []), source: data.source }));
        };

        const PIPELINE_STAGES = [
          { key: "B1_segment", label: "B1 分割", pct: 20 },
          { key: "B2_chunk",   label: "B2 チャンク", pct: 40 },
          { key: "B3_summarize", label: "B3 要約", pct: 65 },
          { key: "C3_name_generate", label: "C3 生成", pct: 85 },
          { key: "completed",  label: "完了", pct: 100 },
        ];
        const stIdx = PIPELINE_STAGES.findIndex(s => s.key === pipeStage);
        const stagePct = stIdx >= 0 ? PIPELINE_STAGES[stIdx].pct : 5;
        const stageLabel = stIdx >= 0 ? PIPELINE_STAGES[stIdx].label : "処理開始中…";

        return (
          <div style={{ ...PAGE_BG, padding: "0 0 4rem 0" }}>
            {/* ヘッダー */}
            <div style={{ display: "flex", alignItems: "center", gap: "1rem", padding: "1.2rem 1.5rem", borderBottom: "1px solid rgba(34,197,94,0.15)" }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "rgba(167,243,208,0.8)", cursor: "pointer", fontSize: "1.1rem" }}>← 戻る</button>
              <span style={{ fontWeight: 900, fontSize: "1.1rem", letterSpacing: "0.04em" }}>📖 粗筋生成</span>
              <span style={{ marginLeft: "auto", fontSize: "0.8rem", color: "rgba(167,243,208,0.55)" }}>Step 1 / 2</span>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "minmax(280px,1fr) minmax(300px,1.2fr)", gap: "1.5rem", padding: "1.5rem", maxWidth: 1100, margin: "0 auto" }}>

              {/* 左カラム: 入力 */}
              <div>
                <div style={{ fontWeight: 900, color: "rgba(167,243,208,0.9)", fontSize: "0.8rem", marginBottom: "0.5rem", letterSpacing: "0.06em" }}>🎨 漫画トーン</div>
                <ToneSelector value={tone} onChange={setTone} />

                <div style={{ marginTop: "1.1rem", fontWeight: 900, color: "rgba(167,243,208,0.9)", fontSize: "0.8rem", marginBottom: "0.45rem", letterSpacing: "0.06em" }}>📄 論文テキスト</div>
                {/* PDF ボタン */}
                <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.5rem" }}>
                  <input ref={fileRef} type="file" accept=".pdf,.txt" style={{ display: "none" }} onChange={e => { const f = e.target.files?.[0]; if (f) { if (f.name.endsWith(".txt")) { const r = new FileReader(); r.onload = ev => { setPastedText(ev.target.result?.slice(0, 100000) || ""); setFileName(f.name); setPdfInfo(`テキストファイル（${f.name}）を読み込みました。`); }; r.readAsText(f); } else handlePdf(f); } }} />
                  <button onClick={() => fileRef.current?.click()} disabled={pdfBusy} style={{ padding: "0.45rem 0.9rem", fontSize: "0.85rem", fontWeight: 700, background: "rgba(34,197,94,0.15)", border: "1px solid rgba(34,197,94,0.4)", borderRadius: "0.6rem", color: "#86efac", cursor: pdfBusy ? "wait" : "pointer" }}>
                    {pdfBusy ? "📄 解析中…" : "📄 PDF / TXT 読込"}
                  </button>
                  {fileName && <span style={{ fontSize: "0.8rem", color: "rgba(167,243,208,0.65)", alignSelf: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 150 }}>{fileName}</span>}
                </div>
                {pdfInfo && <div style={{ fontSize: "0.78rem", color: "rgba(167,243,208,0.7)", marginBottom: "0.5rem" }}>{pdfInfo}</div>}
                <textarea
                  value={pastedText}
                  onChange={e => setPastedText(e.target.value)}
                  placeholder="論文の抄録・本文を貼り付け（必須）"
                  rows={10}
                  style={{
                    width: "100%", padding: "0.75rem", fontSize: "0.88rem",
                    background: "rgba(255,255,255,0.06)", border: "1.5px solid rgba(34,197,94,0.3)",
                    borderRadius: "0.85rem", color: "#eaf8ef", resize: "vertical", outline: "none", boxSizing: "border-box",
                  }}
                />
                <button
                  onClick={generate}
                  disabled={!pastedText.trim() || stage === "generating"}
                  style={{
                    marginTop: "0.7rem", width: "100%", padding: "0.95rem", fontSize: "1rem", fontWeight: 1000,
                    background: (!pastedText.trim() || stage === "generating") ? "rgba(34,197,94,0.3)" : "linear-gradient(135deg,#22c55e,#16a34a)",
                    color: "#06210f", border: "none", borderRadius: "0.9rem",
                    cursor: (!pastedText.trim() || stage === "generating") ? "not-allowed" : "pointer",
                    boxShadow: "0 6px 24px rgba(34,197,94,0.25)",
                  }}
                >
                  {stage === "idle" && "粗筋を生成（AI パイプライン）"}
                  {stage === "generating" && `${stageLabel} ${stagePct}%…`}
                  {stage === "done" && "再生成する"}
                </button>
                {stage === "generating" && (
                  <div style={{ marginTop: "0.75rem", height: 6, borderRadius: 6, background: "rgba(255,255,255,0.1)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 6, width: `${stagePct}%`, background: "linear-gradient(90deg,#22c55e,#16a34a)", transition: "width 0.6s ease" }} />
                  </div>
                )}
                {error && <div style={{ marginTop: "0.6rem", padding: "0.65rem 0.85rem", background: "rgba(127,29,29,0.3)", border: "1px solid rgba(252,165,165,0.4)", borderRadius: "0.75rem", color: "#fca5a5", fontSize: "0.88rem" }}>{error}</div>}
              </div>

              {/* 右カラム: 結果 */}
              <div>
                {!result && stage !== "generating" && (
                  <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(167,243,208,0.3)", fontSize: "0.9rem", textAlign: "center", padding: "2rem" }}>
                    ← テキストを貼り付けて「粗筋を生成」を押すと<br/>テーマ・キャラクター・粗筋が表示されます
                  </div>
                )}
                {stage === "generating" && (
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "rgba(167,243,208,0.6)", fontSize: "0.9rem" }}>
                    AI パイプライン処理中…
                  </div>
                )}
                {result && (
                  <div>
                    {/* テーマ */}
                    {result.theme_line && (
                      <div style={{ ...CARD, marginBottom: "0.75rem", background: "linear-gradient(135deg,rgba(34,197,94,0.18),rgba(16,163,74,0.10))", border: "1.5px solid rgba(34,197,94,0.5)" }}>
                        <div style={{ fontSize: "0.68rem", fontWeight: 900, color: "rgba(167,243,208,0.65)", marginBottom: 4, letterSpacing: "0.06em" }}>🎨 テーマ（{result.tone}）</div>
                        <div style={{ fontSize: "1.05rem", fontWeight: 1000, color: "#eaf8ef" }}>{result.theme_line}</div>
                      </div>
                    )}
                    {/* キャラクター */}
                    {result.characters?.length > 0 && (
                      <div style={{ ...CARD, marginBottom: "0.75rem" }}>
                        <div style={{ fontSize: "0.7rem", fontWeight: 900, color: "rgba(167,243,208,0.75)", marginBottom: "0.5rem", letterSpacing: "0.06em" }}>👥 登場キャラクター</div>
                        {result.characters.map((ch, i) => (
                          <div key={i} style={{ display: "flex", gap: "0.5rem", alignItems: "flex-start", marginBottom: i < result.characters.length - 1 ? "0.4rem" : 0 }}>
                            <span style={{ fontSize: "0.9rem", minWidth: 20 }}>🧬</span>
                            <div>
                              <span style={{ fontWeight: 900, fontSize: "0.88rem", color: "#e9d5ff" }}>{ch.name}</span>
                              <span style={{ fontSize: "0.75rem", color: "rgba(233,213,255,0.6)", marginLeft: 6 }}>{ch.role}</span>
                              {ch.description && <div style={{ fontSize: "0.78rem", color: "rgba(233,213,255,0.7)", marginTop: 2 }}>{ch.description}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* 粗筋 */}
                    {result.synopsis && (
                      <div style={{ ...CARD, marginBottom: "0.75rem", border: "1px solid rgba(59,130,246,0.35)", background: "rgba(30,64,175,0.12)" }}>
                        <div style={{ fontSize: "0.7rem", fontWeight: 900, color: "rgba(167,243,208,0.75)", marginBottom: "0.5rem", letterSpacing: "0.06em" }}>📖 粗筋（3幕構成）</div>
                        <div style={{ fontSize: "0.9rem", color: "#bfdbfe", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{result.synopsis}</div>
                      </div>
                    )}
                    {/* ソース */}
                    <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", marginBottom: "0.75rem" }}>
                      <span style={{ fontSize: "0.73rem", fontWeight: 700, padding: "0.18rem 0.5rem", borderRadius: "99px", background: result.source === "gemini" ? "rgba(234,179,8,0.2)" : "rgba(255,255,255,0.1)", color: result.source === "gemini" ? "#fde68a" : "rgba(234,248,239,0.5)", border: "1px solid rgba(34,197,94,0.25)" }}>
                        {result.source === "gemini" ? "✦ Gemini" : result.source === "openai" ? "✦ OpenAI" : "⚙ mock"}
                      </span>
                    </div>
                    {/* ネーム構成へ */}
                    <button
                      onClick={() => onGoNamePlan(result)}
                      style={{
                        width: "100%", padding: "1rem", fontSize: "1rem", fontWeight: 1000,
                        background: "linear-gradient(135deg,#22c55e,#16a34a)",
                        color: "#06210f", border: "none", borderRadius: "0.9rem",
                        cursor: "pointer", boxShadow: "0 6px 24px rgba(34,197,94,0.3)",
                      }}
                    >
                      このあらすじでネーム構成へ →
                    </button>
                    {/* チャット修正 */}
                    <ChatRefinePanel
                      currentData={result}
                      onRefined={onRefined}
                      disabled={stage === "generating"}
                    />
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      //  NamePlanView — ネーム構成ページ（起承転結）
      // ─────────────────────────────────────────────────────────────────────
      function NamePlanView({ initialData, onBack, onGoNameSheet }) {
        const [data, setData] = useState(initialData || { tone: "少年マンガ", theme_line: "", characters: [], synopsis: "", panel_beats: ["", "", "", ""], source: "none" });
        const [editIdx, setEditIdx] = useState(null); // 編集中の beat インデックス
        const [editText, setEditText] = useState("");
        const [regenBusy, setRegenBusy] = useState(null); // 再生成中の beat インデックス
        const [synopsisOpen, setSynopsisOpen] = useState(false);

        const KISHOTENKETSU = [
          { key: "起", icon: "🌅", desc: "状況設定・問題の発見", color: "rgba(59,130,246,0.22)", border: "rgba(59,130,246,0.45)" },
          { key: "承", icon: "⚡", desc: "問題の展開・対立",   color: "rgba(234,179,8,0.22)",  border: "rgba(234,179,8,0.45)" },
          { key: "転", icon: "🌀", desc: "どんでん返し・核心", color: "rgba(34,197,94,0.22)",  border: "rgba(34,197,94,0.45)" },
          { key: "結", icon: "🌊", desc: "解決・余韻",         color: "rgba(168,85,247,0.22)", border: "rgba(168,85,247,0.45)" },
        ];

        const regenBeat = async (idx) => {
          setRegenBusy(idx);
          try {
            const instruction = `${KISHOTENKETSU[idx].key}（${KISHOTENKETSU[idx].desc}）のコマ案を、現在の粗筋に合わせて新しく作り直してください。他の起承転結は変えないでください。`;
            const res = await fetch(apiUrl("/api/ai/refine"), {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tone: data.tone, instruction, theme_line: data.theme_line, characters: data.characters, synopsis: data.synopsis, panel_beats: data.panel_beats }),
            });
            const d = await res.json();
            if (d.ok && d.panel_beats?.length) setData(prev => ({ ...prev, panel_beats: d.panel_beats }));
          } catch {}
          setRegenBusy(null);
        };

        const onRefined = (d) => {
          setData(prev => ({
            ...prev,
            theme_line: d.theme_line ?? prev.theme_line,
            characters: d.characters?.length ? d.characters : prev.characters,
            synopsis: d.synopsis ?? prev.synopsis,
            panel_beats: d.panel_beats?.length ? d.panel_beats : prev.panel_beats,
          }));
        };

        const saveEdit = () => {
          setData(prev => { const b = [...prev.panel_beats]; b[editIdx] = editText; return { ...prev, panel_beats: b }; });
          setEditIdx(null);
        };

        return (
          <div style={{ ...PAGE_BG, padding: "0 0 4rem 0" }}>
            {/* ヘッダー */}
            <div style={{ display: "flex", alignItems: "center", gap: "1rem", padding: "1.2rem 1.5rem", borderBottom: "1px solid rgba(34,197,94,0.15)" }}>
              <button onClick={onBack} style={{ background: "none", border: "none", color: "rgba(167,243,208,0.8)", cursor: "pointer", fontSize: "1.1rem" }}>← 粗筋に戻る</button>
              <span style={{ fontWeight: 900, fontSize: "1.1rem", letterSpacing: "0.04em" }}>🎬 ネーム構成（起承転結）</span>
              <span style={{ marginLeft: "auto", fontSize: "0.8rem", color: "rgba(167,243,208,0.55)" }}>Step 2 / 2</span>
            </div>

            <div style={{ maxWidth: 860, margin: "0 auto", padding: "1.5rem" }}>
              {/* 粗筋サマリー（折りたたみ） */}
              {data.synopsis && (
                <div style={{ marginBottom: "1.2rem" }}>
                  <button onClick={() => setSynopsisOpen(v => !v)} style={{ background: "none", border: "none", color: "rgba(167,243,208,0.8)", cursor: "pointer", fontWeight: 900, fontSize: "0.85rem", padding: 0 }}>
                    {synopsisOpen ? "▾" : "▸"} 選択した粗筋を{synopsisOpen ? "閉じる" : "確認する"}
                  </button>
                  {synopsisOpen && (
                    <div style={{ marginTop: "0.5rem", ...CARD, color: "#bfdbfe", fontSize: "0.88rem", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>
                      {data.theme_line && <div style={{ fontWeight: 900, color: "#86efac", marginBottom: "0.5rem" }}>{data.theme_line}</div>}
                      {data.synopsis}
                    </div>
                  )}
                </div>
              )}

              {/* テーマ一行 */}
              {data.theme_line && (
                <div style={{ marginBottom: "1rem", padding: "0.65rem 1rem", background: "linear-gradient(135deg,rgba(34,197,94,0.15),rgba(16,163,74,0.08))", border: "1.5px solid rgba(34,197,94,0.4)", borderRadius: "0.85rem" }}>
                  <span style={{ fontSize: "0.68rem", fontWeight: 900, color: "rgba(167,243,208,0.65)", letterSpacing: "0.06em" }}>テーマ </span>
                  <span style={{ fontSize: "1rem", fontWeight: 1000, color: "#eaf8ef" }}>{data.theme_line}</span>
                  <span style={{ marginLeft: 8, fontSize: "0.72rem", color: "rgba(167,243,208,0.5)" }}>({data.tone})</span>
                </div>
              )}

              {/* 起承転結 4拍カード */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem", marginBottom: "1.2rem" }}>
                {KISHOTENKETSU.map(({ key, icon, desc, color, border }, i) => (
                  <div key={key} style={{ background: color, border: `1.5px solid ${border}`, borderRadius: "1rem", padding: "0.9rem 1rem", position: "relative" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.4rem", marginBottom: "0.45rem" }}>
                      <span style={{ fontSize: "1.2rem" }}>{icon}</span>
                      <span style={{ fontSize: "0.82rem", fontWeight: 900, color: "#eaf8ef" }}>{key}</span>
                      <span style={{ fontSize: "0.7rem", color: "rgba(234,248,239,0.5)" }}>— {desc}</span>
                    </div>
                    {editIdx === i ? (
                      <div>
                        <textarea
                          value={editText}
                          onChange={e => setEditText(e.target.value)}
                          rows={3}
                          style={{ width: "100%", fontSize: "0.88rem", padding: "0.5rem", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(34,197,94,0.4)", borderRadius: "0.5rem", color: "#eaf8ef", resize: "vertical", boxSizing: "border-box" }}
                        />
                        <div style={{ display: "flex", gap: "0.4rem", marginTop: "0.35rem" }}>
                          <button onClick={saveEdit} style={{ padding: "0.3rem 0.7rem", fontSize: "0.8rem", fontWeight: 900, background: "rgba(34,197,94,0.4)", border: "none", borderRadius: "0.4rem", color: "#86efac", cursor: "pointer" }}>保存</button>
                          <button onClick={() => setEditIdx(null)} style={{ padding: "0.3rem 0.7rem", fontSize: "0.8rem", background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "0.4rem", color: "rgba(234,248,239,0.6)", cursor: "pointer" }}>キャンセル</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ fontSize: "0.92rem", color: "#eaf8ef", fontWeight: 700, lineHeight: 1.6, minHeight: "3rem" }}>
                        {data.panel_beats?.[i] || <span style={{ color: "rgba(234,248,239,0.3)" }}>— 未生成 —</span>}
                      </div>
                    )}
                    {editIdx !== i && (
                      <div style={{ display: "flex", gap: "0.4rem", marginTop: "0.5rem" }}>
                        <button onClick={() => { setEditIdx(i); setEditText(data.panel_beats?.[i] || ""); }} style={{ padding: "0.25rem 0.6rem", fontSize: "0.75rem", fontWeight: 700, background: "rgba(255,255,255,0.12)", border: "none", borderRadius: "0.4rem", color: "rgba(234,248,239,0.7)", cursor: "pointer" }}>✏ 編集</button>
                        <button onClick={() => regenBeat(i)} disabled={regenBusy !== null} style={{ padding: "0.25rem 0.6rem", fontSize: "0.75rem", fontWeight: 700, background: "rgba(34,197,94,0.2)", border: "none", borderRadius: "0.4rem", color: "#86efac", cursor: regenBusy !== null ? "wait" : "pointer", opacity: regenBusy === i ? 0.6 : 1 }}>
                          {regenBusy === i ? "⟳ 再生成中…" : "⟳ 再生成"}
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* ソース表示 */}
              <div style={{ marginBottom: "1rem" }}>
                <span style={{ fontSize: "0.73rem", fontWeight: 700, padding: "0.18rem 0.5rem", borderRadius: "99px", background: data.source === "gemini" ? "rgba(234,179,8,0.2)" : "rgba(255,255,255,0.1)", color: data.source === "gemini" ? "#fde68a" : "rgba(234,248,239,0.5)", border: "1px solid rgba(34,197,94,0.25)" }}>
                  {data.source === "gemini" ? "✦ Gemini" : data.source === "openai" ? "✦ OpenAI" : "⚙ mock"}
                </span>
              </div>

              {/* チャット修正 */}
              <ChatRefinePanel currentData={data} onRefined={onRefined} disabled={regenBusy !== null} />

              {/* ネーム生成へ */}
              <button
                onClick={() => onGoNameSheet && onGoNameSheet(data)}
                disabled={!data.panel_beats?.some(b => b)}
                style={{
                  marginTop: "1.2rem", width: "100%", padding: "1.05rem", fontSize: "1rem", fontWeight: 1000,
                  background: (!data.panel_beats?.some(b => b)) ? "rgba(34,197,94,0.25)" : "linear-gradient(135deg,#22c55e,#16a34a)",
                  color: "#06210f", border: "none", borderRadius: "0.9rem",
                  cursor: (!data.panel_beats?.some(b => b)) ? "not-allowed" : "pointer",
                  boxShadow: "0 6px 24px rgba(34,197,94,0.3)",
                }}
              >
                📋 このネーム構成でネーム生成へ →
              </button>
            </div>
          </div>
        );
      }

      function DoctorCanvas() {
        const initialNav = parseInitialRouteFromHash();
        const [route, setRoute] = useState(initialNav.route);
        const [activeWorkId, setActiveWorkId] = useState(initialNav.workId);
        const routeRef = useRef({ route: initialNav.route, workId: initialNav.workId });
        const [checkoutBanner, setCheckoutBanner] = useState("");
        const [catalogList, setCatalogList] = useState([]);
        // 粗筋ページ → ネーム構成ページ へデータを引き継ぐ state
        const [synopsisData, setSynopsisData] = useState(null);
        // ネーム構成ページ（or HomeView の結果）→ ネーム生成ページ へ引き継ぐ state
        const [namePlanData, setNamePlanData] = useState(null);

        const refreshCatalog = () => {
          fetchCatalogArtworksArray().then(setCatalogList);
        };

        useEffect(() => {
          refreshCatalog();
        }, []);

        const mergedWorks = useMemo(() => {
          const seen = new Set();
          const out = [];
          for (const w of catalogList) {
            if (!seen.has(w.id)) {
              seen.add(w.id);
              out.push(w);
            }
          }
          for (const w of works) {
            if (!seen.has(w.id)) {
              seen.add(w.id);
              out.push(w);
            }
          }
          return out;
        }, [catalogList]);

        useEffect(() => {
          try {
            const qs = new URLSearchParams(window.location.search || "");
            const c = qs.get("checkout");
            if (c === "success") {
              setCheckoutBanner(
                "Stripe Checkout を完了しました。購入の反映は Webhook 経由のため、数秒〜数分かかることがあります。"
              );
            } else if (c === "cancel") {
              setCheckoutBanner("Checkout をキャンセルしました。");
            }
            if (c) {
              const path = window.location.pathname || "/";
              const hash = window.location.hash || "";
              window.history.replaceState(window.history.state || {}, "", path + hash);
            }
          } catch {
            /* ignore */
          }
        }, []);

        const onDemo = () => setRoute("works");
        const onTryAi = () => scrollToId("try-ai");

        const onOpenManga = (workId) => {
          setActiveWorkId(workId);
          setRoute("manga");
        };

        // ブラウザバック対応（SPA内で1ページ戻す）
        useEffect(() => {
          routeRef.current = { route, workId: activeWorkId };
          const url = route === "manga" ? `#manga/${encodeURIComponent(activeWorkId)}` : `#${route}`;
          window.history.pushState({ route, workId: activeWorkId }, "", url);
        }, [route, activeWorkId]);

        useEffect(() => {
          const onPop = (e) => {
            const st = e.state;
            if (st && st.route) {
              setRoute(st.route);
              if (st.workId) setActiveWorkId(st.workId);
              return;
            }
            // state が無い場合は hash を読む（最低限）
            const h = (window.location.hash || "").replace(/^#/, "");
            if (h.startsWith("manga/")) {
              const wid = decodeURIComponent(h.slice("manga/".length));
              setActiveWorkId(wid || works[0].id);
              setRoute("manga");
              return;
            }
            if (h === "works" || h === "auth" || h === "author" || h === "home" || h === "dashboard" || h === "studio" || h === "synopsis" || h === "nameplan" || h === "namesheet") setRoute(h || "home");
            else setRoute("home");
          };
          window.addEventListener("popstate", onPop);
          return () => window.removeEventListener("popstate", onPop);
        }, []);

        let page = null;
        if (route === "works")
          page = (
            <WorksView
              mergedWorks={mergedWorks}
              onBackToHome={() => setRoute("home")}
              onSelectWork={onOpenManga}
              onOpenDashboard={() => setRoute("dashboard")}
              onOpenStudio={() => setRoute("studio")}
            />
          );
        else if (route === "author") page = <AuthorView onBackToWorks={() => setRoute("works")} />;
        else if (route === "manga")
          page = (
            <MangaReaderView
              mergedWorks={mergedWorks}
              workId={activeWorkId}
              onBackToWorks={() => setRoute("works")}
              onAuthorClick={() => setRoute("author")}
            />
          );
        else if (route === "auth") page = <AuthView onBackToHome={() => setRoute("home")} onAuthed={() => setRoute("works")} />;
        else if (route === "dashboard")
          page = <DashboardView mergedWorks={mergedWorks} onBackToWorks={() => setRoute("works")} onOpenManga={onOpenManga} />;
        else if (route === "studio") page = <StudioView onBack={() => setRoute("works")} onPublished={refreshCatalog} />;
        else if (route === "synopsis")
          page = <SynopsisView
            onBack={() => setRoute("home")}
            onGoNamePlan={(data) => { setSynopsisData(data); setRoute("nameplan"); }}
          />;
        else if (route === "nameplan")
          page = <NamePlanView
            initialData={synopsisData}
            onBack={() => setRoute("synopsis")}
            onGoNameSheet={(data) => { setNamePlanData(data); setRoute("namesheet"); }}
          />;
        else if (route === "namesheet")
          page = <NameSheetView
            initialData={namePlanData}
            onBack={() => setRoute(namePlanData ? "nameplan" : "home")}
          />;
        else page = <HomeView onDemo={onDemo} onTryAi={onTryAi} onOpenAuth={() => setRoute("auth")} onOpenStudio={() => setRoute("studio")} onOpenSynopsis={() => setRoute("synopsis")} onOpenNameSheet={(data) => { setNamePlanData(data); setRoute("namesheet"); }} />;

        return (
          <>
            {checkoutBanner ? (
              <div
                style={{
                  position: "fixed",
                  top: 0,
                  left: 0,
                  right: 0,
                  zIndex: 20000,
                  padding: "0.65rem 1rem",
                  background: "rgba(34,197,94,0.94)",
                  color: "#06210f",
                  fontWeight: 900,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: "0.75rem",
                  boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
                }}
              >
                <span style={{ flex: "1 1 auto", lineHeight: 1.5 }}>{checkoutBanner}</span>
                <button
                  type="button"
                  onClick={() => setCheckoutBanner("")}
                  style={{
                    flex: "0 0 auto",
                    padding: "0.4rem 0.75rem",
                    borderRadius: "0.65rem",
                    border: "1px solid rgba(6,33,15,0.35)",
                    background: "rgba(255,255,255,0.35)",
                    color: "#06210f",
                    cursor: "pointer",
                    fontWeight: 1000,
                  }}
                >
                  閉じる
                </button>
              </div>
            ) : null}
            {page}
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<DoctorCanvas />);
    </script>
  </body>
</html>
